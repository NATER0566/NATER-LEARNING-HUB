<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER HUB | Payment Verification</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --red: #d32f2f; --gold: #d4af37; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
        
        /* STARFIELD CANVAS */
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%); }
        .reflective-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(211, 47, 47, 0.08) 0%, transparent 40%); z-index: -1; pointer-events: none; }

        .verify-card { 
            max-width: 550px; width: 100%; background: rgba(15, 15, 15, 0.9); 
            border: 3px solid var(--gold); border-radius: 35px; padding: 50px 40px; 
            text-align: center; box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(15px); position: relative;
        }

        .brand-nater { font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
        .brand-hub { font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.2rem; color: var(--red); letter-spacing: 4px; text-transform: uppercase; }
        .brand-tagline { letter-spacing: 3px; color: #aaa; font-weight: bold; font-size: 0.75rem; margin-top: -5px; text-transform: uppercase; margin-bottom: 30px; }

        .id-input-field { 
            background: #000; border: 2px solid #333; border-radius: 15px; 
            padding: 15px 20px; color: white; width: 100%; text-align: center; 
            font-family: monospace; letter-spacing: 2px; margin-bottom: 20px;
            font-size: 1.2rem; transition: 0.3s;
        }
        .id-input-field:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        .btn-verify { 
            background: var(--gold); color: black; font-weight: 900; border-radius: 15px; 
            padding: 15px; width: 100%; border: none; font-size: 1.1rem; 
            transition: 0.3s; letter-spacing: 1px;
        }
        .btn-verify:hover { background: white; transform: translateY(-3px); }

        .top-nav { position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="reflective-glow"></div>

<div class="top-nav">
    <button class="btn btn-outline-warning btn-sm rounded-pill px-3" onclick="window.location.href='academy.html'">
        <i class="fas fa-arrow-left me-2"></i> BACK
    </button>
</div>

<div class="verify-card">
    <div class="mb-1">
        <span class="brand-nater site-nater">NATER</span><span class="brand-hub site-hub"> HUB</span>
    </div>
    <div class="brand-tagline dynamic-site-tagline">SECURE PRODUCTION PORTAL</div>

    <h4 class="fw-bold mb-3">Manual Enrollment</h4>
    <p class="text-muted small mb-4">If your course didn't unlock automatically, enter your Paystack Reference ID below to sync your credentials.</p>

    <div class="manual-box">
        <input type="text" id="refInput" class="id-input-field" placeholder="e.g. T7382910X">
        <button class="btn-verify" id="verifyBtn" onclick="verifyRef()">
            <i class="fas fa-shield-check me-2"></i> UNLOCK MY COURSE
        </button>
    </div>

    <div id="status" class="mt-4 small fw-bold"></div>
</div>

<script>
    // --- ASAP LOGIC: Immediate execution for speed and PWA registration ---
    (async function immediateSync() {
        initStars();
        animateStars();

        // PWA Service Worker Registration
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js")
                    .then(reg => console.log("Payment Sync PWA Ready"))
                    .catch(err => console.error("SW failed", err));
            });
        }

        // Load branding from Postgres immediately
        await fetchBranding();

        // Check if reference is in URL (Auto-trigger if present)
        const urlParams = new URLSearchParams(window.location.search);
        const refParam = urlParams.get('reference') || urlParams.get('ref');
        if(refParam) {
            document.getElementById('refInput').value = refParam;
            verifyRef();
        }
    })();

    async function fetchBranding() {
        try {
            const res = await fetch('/api/public-settings');
            const data = await res.json();
            if(data.success) {
                const nameParts = (data.siteName || 'NATER HUB').split(' ');
                const n = nameParts[0];
                const h = " " + nameParts.slice(1).join(' ');
                document.querySelectorAll('.site-nater').forEach(el => el.innerText = n);
                document.querySelectorAll('.site-hub').forEach(el => el.innerText = h);
                if(data.tagline) document.querySelector('.dynamic-site-tagline').innerText = data.tagline;
            }
        } catch (err) { console.log("Branding fetch error"); }
    }

    async function verifyRef() {
        const ref = document.getElementById('refInput').value.trim();
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status');
        
        if(!ref) return Swal.fire('Error', 'Please enter your Reference ID', 'error');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> AUTHENTICATING...';
        status.innerText = "";

        try {
            const response = await fetch(`/api/paystack/verify?reference=${ref}`);
            const data = await response.json();

            if(data.success) {
                status.style.color = "#28a745";
                status.innerHTML = `<i class="fas fa-check-circle me-2"></i> Verified! Access Granted.`;
                Swal.fire({
                    icon: 'success',
                    title: 'Access Granted!',
                    text: data.message || 'Your credentials are recorded and live.',
                    confirmButtonColor: '#d4af37'
                }).then(() => window.location.href = 'academy.html');
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-shield-check me-2"></i> UNLOCK MY COURSE';
                status.style.color = "#d32f2f";
                status.innerText = "❌ Verification failed: " + (data.message || 'Reference not found');
            }
        } catch (error) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-shield-check me-2"></i> UNLOCK MY COURSE';
            Swal.fire('Connection Error', 'Could not reach verification server.', 'error');
        }
    }

    /* STARFIELD ANIMATION ENGINE */
    let stars = [];
    function initStars() {
        const canvas = document.getElementById('starCanvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, o:Math.random()});
    }

    function animateStars() {
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white";
        stars.forEach(s => { ctx.globalAlpha = s.o; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y -= 0.3; if(s.y < 0) s.y = canvas.height; });
        requestAnimationFrame(animateStars);
    }
</script>
</body>
</html>
