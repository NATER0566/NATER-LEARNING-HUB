<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER LEARNING HUB | Premium Payment Verification</title>
    
    <!-- Enhanced Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com https://www.soundjay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://api.naterhub.com https://api.paystack.co; media-src 'self' https://www.soundjay.com;">
    
    <meta name="theme-color" content="#d32f2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NATER HUB">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --brand-primary: #d32f2f; 
            --brand-dark: #b71c1c; 
            --brand-darker: #8b0000;
            --brand-light: #ffcdd2;
            --accent-gold: #FFD700;
            --accent-platinum: #e5e4e2;
            
            --gradient-primary: linear-gradient(135deg, #d32f2f 0%, #b71c1c 50%, #8b0000 100%);
            --gradient-gold: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            --gradient-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-xl: 0 16px 40px rgba(0,0,0,0.16);
            --shadow-premium: 0 20px 60px rgba(211, 47, 47, 0.15);
            --shadow-gold: 0 20px 60px rgba(255, 215, 0, 0.2);
            
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-brand: 'Cinzel', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%);
            background-attachment: fixed;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 80px 20px; 
            overflow-x: hidden; 
            position: relative;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(211, 47, 47, 0.1) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
        }

        /* Premium Master Sync Screen */
        #masterSyncScreen {
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #2b0000 0%, #000 100%);
            z-index: 99999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .celestial-container { 
            position: relative; 
            width: 220px; 
            height: 220px; 
            margin-bottom: 50px; 
        }

        .core-orb {
            position: absolute; 
            inset: 20%; 
            background: var(--gradient-primary); 
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--accent-gold);
            font-size: 4rem; 
            z-index: 5; 
            box-shadow: 
                0 0 80px rgba(211, 47, 47, 0.8),
                inset 0 0 40px rgba(255, 215, 0, 0.4);
            animation: corePlumbing 1.5s infinite alternate ease-in-out;
        }

        .star-layer {
            position: absolute; 
            inset: -30px; 
            border: 8px solid transparent; 
            border-radius: 50%; 
            animation: rotateStar 3s linear infinite;
        }

        .refractive { 
            border-top: 10px solid var(--accent-gold); 
            border-bottom: 10px solid var(--accent-gold); 
            filter: blur(1px) drop-shadow(0 0 50px var(--accent-gold));
            animation-duration: 2s;
        }

        .reflective { 
            border-left: 10px solid #fff; 
            border-right: 10px solid #fff; 
            opacity: 0.9; 
            filter: drop-shadow(0 0 60px #fff);
            animation-direction: reverse; 
            animation-duration: 4s;
        }

        .shining-flares {
            position: absolute; 
            inset: -60px; 
            border: 4px dashed rgba(255,255,255,0.6);
            border-radius: 50%; 
            animation: rotateStar 12s linear infinite;
            filter: blur(2px);
        }

        .audio-toggle {
            position: absolute; 
            top: 40px; 
            right: 40px; 
            background: var(--gradient-glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--accent-gold); 
            color: var(--accent-gold); 
            border-radius: 50px;
            padding: 12px 24px; 
            font-size: 14px; 
            font-weight: 800; 
            cursor: pointer;
            z-index: 100000; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
        }

        .audio-toggle:hover {
            background: var(--gradient-gold);
            color: #000;
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .sync-text { 
            text-align: center; 
            font-family: var(--font-brand); 
            z-index: 10; 
        }

        .main-msg { 
            display: block; 
            color: #fff; 
            font-size: 2rem; 
            font-weight: 900; 
            letter-spacing: 6px; 
            margin-bottom: 16px; 
            animation: flashGlow 1s infinite alternate;
        }

        .sub-msg { 
            color: #aaa; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-family: var(--font-primary);
        }

        @keyframes rotateStar { 
            0% { transform: rotate(0deg) scale(1); } 
            50% { transform: rotate(180deg) scale(1.5); } 
            100% { transform: rotate(360deg) scale(1); } 
        }

        @keyframes corePlumbing { 
            from { 
                transform: scale(1) rotate(0deg); 
                filter: brightness(1); 
                box-shadow: 
                    0 0 80px rgba(211, 47, 47, 0.8),
                    inset 0 0 40px rgba(255, 215, 0, 0.4);
            } 
            to { 
                transform: scale(1.3) rotate(20deg); 
                filter: brightness(2); 
                box-shadow: 
                    0 0 120px rgba(211, 47, 47, 1),
                    inset 0 0 60px rgba(255, 215, 0, 0.6);
            } 
        }

        @keyframes flashGlow { 
            from { 
                opacity: 0.5; 
                text-shadow: 0 0 10px #fff; 
            } 
            to { 
                opacity: 1; 
                text-shadow: 0 0 40px #fff, 0 0 80px var(--accent-gold); 
            } 
        }

        /* Premium Verification Card */
        .verify-card { 
            opacity: 0;
            transition: opacity 0.8s ease-in;
            max-width: 650px; 
            width: 100%; 
            background: var(--gradient-card); 
            backdrop-filter: blur(20px); 
            border: 5px solid var(--accent-gold); 
            border-radius: 40px; 
            padding: 60px 50px; 
            text-align: center; 
            box-shadow: 
                var(--shadow-gold),
                0 0 120px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        body.data-ready .verify-card { 
            opacity: 1; 
        }

        .verify-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        #starCanvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -2; 
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%); 
        }

        .reflective-glow { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.12) 0%, transparent 40%), 
                radial-gradient(circle at 80% 70%, rgba(211, 47, 47, 0.12) 0%, transparent 40%); 
            z-index: -1; 
            pointer-events: none; 
            animation: premiumGlow 15s ease-in-out infinite alternate; 
        }

        @keyframes premiumGlow {
            0% { 
                background: 
                    radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.12) 0%, transparent 40%), 
                    radial-gradient(circle at 80% 70%, rgba(211, 47, 47, 0.12) 0%, transparent 40%);
            }
            50% { 
                background: 
                    radial-gradient(circle at 30% 40%, rgba(255, 215, 0, 0.18) 0%, transparent 50%), 
                    radial-gradient(circle at 70% 60%, rgba(211, 47, 47, 0.18) 0%, transparent 50%);
            }
            100% { 
                background: 
                    radial-gradient(circle at 25% 35%, rgba(255, 215, 0, 0.24) 0%, transparent 60%), 
                    radial-gradient(circle at 75% 65%, rgba(211, 47, 47, 0.24) 0%, transparent 60%);
            }
        }

        /* Premium Brand */
        .brand-container {
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .brand-nater { 
            font-family: var(--font-brand); 
            font-weight: 900; 
            font-size: 2.8rem; 
            color: var(--accent-gold); 
            letter-spacing: 6px; 
            text-transform: uppercase;
            animation: brandGlow 3s ease-in-out infinite alternate;
        }

        .brand-hub { 
            font-family: var(--font-brand); 
            font-weight: 900; 
            font-size: 2.8rem; 
            color: var(--brand-primary); 
            letter-spacing: 6px; 
            text-transform: uppercase;
            animation: brandGlow 3s ease-in-out infinite alternate;
        }

        @keyframes brandGlow {
            from { 
                filter: brightness(1) drop-shadow(0 0 15px rgba(255, 215, 0, 0.4)); 
            } 
            to { 
                filter: brightness(1.3) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6)); 
            } 
        }

        .brand-tagline { 
            letter-spacing: 4px; 
            color: #666; 
            font-weight: 800; 
            font-size: 0.8rem; 
            margin-top: -8px; 
            text-transform: uppercase; 
            margin-bottom: 40px;
            font-family: var(--font-primary);
        }

        /* Premium Inputs */
        .id-input-field { 
            background: var(--glass-bg); 
            border: 3px solid var(--glass-border); 
            border-radius: 20px; 
            padding: 20px 24px; 
            color: white; 
            width: 100%; 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            letter-spacing: 3px; 
            margin-bottom: 24px;
            font-size: 1.3rem; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 1;
        }

        .id-input-field::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .id-input-field:focus { 
            border-color: var(--accent-gold); 
            outline: none; 
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.4),
                var(--shadow-lg);
            background: rgba(255,255,255,0.15);
            transform: translateY(-3px);
        }

        /* Premium Button */
        .btn-verify { 
            background: var(--gradient-gold); 
            color: #000; 
            font-weight: 900; 
            border-radius: 20px; 
            padding: 20px; 
            width: 100%; 
            border: none; 
            font-size: 1.2rem; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 2px; 
            cursor: pointer;
            font-family: var(--font-display);
            text-transform: uppercase;
            box-shadow: var(--shadow-gold);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-verify::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .btn-verify:hover::before {
            left: 100%;
        }

        .btn-verify:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 100px rgba(255, 215, 0, 0.5);
        }

        .btn-verify:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Status Display */
        #status {
            margin-top: 24px;
            font-weight: 700;
            font-size: 0.9rem;
            min-height: 24px;
            position: relative;
            z-index: 1;
        }

        .status-success {
            color: #4CAF50;
        }

        .status-error {
            color: #f44336;
        }

        /* Premium Navigation */
        .top-nav { 
            position: absolute; 
            top: 30px; 
            left: 30px; 
            display: flex; 
            gap: 16px; 
            z-index: 10; 
        }

        .nav-btn {
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            color: var(--brand-primary);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-family: var(--font-primary);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-premium);
            background: var(--gradient-primary);
            color: white;
            border-color: var(--brand-primary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .verify-card {
                padding: 40px 30px;
                margin: 20px;
            }

            .brand-nater, .brand-hub {
                font-size: 2.2rem;
            }

            .celestial-container {
                width: 180px;
                height: 180px;
            }

            .core-orb {
                font-size: 3rem;
            }

            .main-msg {
                font-size: 1.6rem;
            }

            .audio-toggle {
                top: 20px;
                right: 20px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        /* Premium Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 1s ease-out;
        }
    </style>
</head>
<body data-theme="dark" oncontextmenu="return false;" onkeydown="return disableShortcuts(event)">

<!-- Premium Master Sync Screen -->
<div id="masterSyncScreen">
    <button class="audio-toggle" onclick="toggleAudio()">
        <i class="fa-solid fa-volume-up" id="volIcon"></i> MUTE AUDIO
    </button>
    <div class="celestial-container">
        <div class="shining-flares"></div>
        <div class="star-layer refractive"></div>
        <div class="star-layer reflective"></div>
        <div class="core-orb">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
    </div>
    <div class="sync-text">
        <span class="main-msg">SECURE HANDSHAKE</span>
        <span class="sub-msg">Authenticating Payment Gateway Protocols...</span>
    </div>
</div>

<!-- Premium Audio System -->
<audio id="syncVoice" loop preload="auto">
    <source src="https://www.soundjay.com/buttons/sounds/button-20.mp3" type="audio/mpeg">
</audio>
<audio id="shimmerReveal" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-01.mp3" type="audio/mpeg">
</audio>

<!-- Premium Background Effects -->
<canvas id="starCanvas"></canvas>
<div class="reflective-glow"></div>

<!-- Premium Navigation -->
<div class="top-nav">
    <a href="academy.html" class="nav-btn">
        <i class="fa-solid fa-arrow-left"></i>
        BACK TO ACADEMY
    </a>
    <a href="dashboard.html" class="nav-btn">
        <i class="fa-solid fa-th-large"></i>
        DASHBOARD
    </a>
</div>

<!-- Premium Verification Card -->
<div class="verify-card">
    <div class="brand-container">
        <span class="brand-nater site-nater">NATER</span>
        <span class="brand-hub site-hub">LEARNING HUB</span>
    </div>
    <div class="brand-tagline dynamic-site-tagline">SECURE PAYMENT VERIFICATION</div>

    <h4 class="fw-bold mb-4">Manual Course Enrollment</h4>
    <p class="text-muted small mb-4">If your course didn't unlock automatically, enter your Paystack Reference ID below to sync your credentials.</p>

    <div class="manual-box">
        <input type="text" id="refInput" class="id-input-field" placeholder="e.g. T7382910X">
        <button class="btn-verify" id="verifyBtn" onclick="verifyRef()">
            <i class="fa-solid fa-shield-check me-2"></i>UNLOCK MY COURSE
        </button>
    </div>

    <div id="status" class="small fw-bold"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // Enhanced Security
    function disableShortcuts(e) { 
        if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u'))) {
            e.preventDefault();
            return false;
        }
    }

    // Premium Toast Notification
    const showToast = (icon, title, text = '') => {
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });
        Toast.fire({ 
            icon: icon, 
            title: title,
            text: text
        });
    };

    // State Management
    let verificationInProgress = false;
    let isMuted = false;

    // Audio System
    const vAudio = document.getElementById('syncVoice');
    const sReveal = document.getElementById('shimmerReveal');

    function toggleAudio() {
        isMuted = !isMuted; 
        vAudio.muted = isMuted;
        const volIcon = document.getElementById('volIcon');
        volIcon.className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
        
        const audioBtn = document.querySelector('.audio-toggle');
        audioBtn.innerHTML = `${volIcon.outerHTML} ${isMuted ? 'UNMUTE' : 'MUTE'} AUDIO`;
    }

    // Auto-play audio on user interaction
    window.addEventListener('click', () => { 
        if(!isMuted && vAudio.paused) vAudio.play().catch(() => {}); 
    }, { once: false });

    // Instant Network Handshake
    const dataPromise = fetch('/api/public-settings')
        .then(res => res.json())
        .catch(() => ({ success: false }));

    // Premium Initialization
    async function init() {
        initStars();
        animateStars();
        
        // Start audio
        if(!isMuted) {
            vAudio.play().catch(() => {});
        }

        try {
            const data = await dataPromise;
            if(data.success) {
                const nameParts = (data.siteName || 'NATER LEARNING HUB').split(' ');
                document.querySelectorAll('.site-nater').forEach(el => el.innerText = nameParts[0]);
                document.querySelectorAll('.site-hub').forEach(el => el.innerText = " " + nameParts.slice(1).join(' '));
                if(data.tagline) {
                    document.querySelector('.dynamic-site-tagline').innerText = data.tagline;
                }
            }
        } finally {
            // Dismiss loader and reveal page
            setTimeout(() => {
                if(!isMuted) {
                    sReveal.play().catch(() => {});
                }
                vAudio.pause();
                const loader = document.getElementById('masterSyncScreen');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.body.classList.add('data-ready');
                }, 1000);
            }, 4000);
        }
    }

    // Premium Payment Verification
    async function verifyRef() {
        if (verificationInProgress) return;
        
        const ref = document.getElementById('refInput').value.trim();
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status');
        
        if(!ref) {
            return Swal.fire({
                title: 'Missing Reference ID',
                text: 'Please enter your Paystack Reference ID',
                icon: 'warning',
                confirmButtonColor: '#d32f2f'
            });
        }

        // Get user token
        const token = localStorage.getItem('token');
        if (!token) {
            return Swal.fire({
                title: 'Session Expired',
                text: 'Please login again to continue.',
                icon: 'error',
                confirmButtonColor: '#d32f2f'
            });
        }

        // Extract email from JWT
        let email;
        try {
            const student = JSON.parse(atob(token.split('.')[1]));
            email = student.email;
        } catch (e) {
            return Swal.fire({
                title: 'Invalid Session',
                text: 'Please login again to continue.',
                icon: 'error',
                confirmButtonColor: '#d32f2f'
            });
        }

        verificationInProgress = true;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>AUTHENTICATING...';
        status.className = '';
        status.innerText = '';
        
        try {
            const response = await fetch('/api/paystack/verify', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ 
                    reference: ref, 
                    email: email 
                })
            });
            
            const data = await response.json();

            if(data.success) {
                status.className = 'status-success';
                status.innerHTML = `<i class="fa-solid fa-check-circle me-2"></i>ENROLLMENT SUCCESSFUL!`;
                
                showToast('success', 'Access Granted', 'Your course has been unlocked successfully');
                
                Swal.fire({
                    icon: 'success',
                    title: 'PAYMENT VERIFIED!',
                    text: 'Your course has been manually unlocked. Redirecting to academy...',
                    confirmButtonColor: '#FFD700',
                    timer: 3000,
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = 'academy.html';
                });
            } else {
                throw new Error(data.message || 'Reference ID not found or already used.');
            }
        } catch (error) {
            verificationInProgress = false;
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-shield-check me-2"></i>UNLOCK MY COURSE';
            
            status.className = 'status-error';
            status.innerText = "❌ " + error.message;
            
            showToast('error', 'Verification Failed', error.message);
            
            Swal.fire({
                title: 'Verification Failed',
                text: error.message,
                icon: 'error',
                confirmButtonColor: '#d32f2f'
            });
        }
    }

    // Premium Star Background
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    
    function initStars() {
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight;
        for(let i=0; i<200; i++) {
            stars.push({
                x: Math.random() * canvas.width, 
                y: Math.random() * canvas.height, 
                s: Math.random() * 3 + 0.5, 
                o: Math.random() * 0.8 + 0.2,
                speed: Math.random() * 0.5 + 0.1
            });
        }
    }
    
    function animateStars() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        // Create gradient background
        const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, canvas.width / 2
        );
        gradient.addColorStop(0, 'rgba(26, 26, 26, 0.8)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "white";
        stars.forEach(s => { 
            ctx.globalAlpha = s.o; 
            ctx.beginPath(); 
            ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); 
            ctx.fill();
            
            // Add glow for larger stars
            if (s.s > 2) {
                ctx.globalAlpha = s.o * 0.3;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            s.y -= s.speed;
            if(s.y < -10) {
                s.y = canvas.height + 10;
                s.x = Math.random() * canvas.width;
            }
        });
        
        requestAnimationFrame(animateStars);
    }

    // Premium Security Enhancements
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
            e.preventDefault();
            return false;
        }
    });

    // Window resize handler
    window.addEventListener('resize', () => {
        initStars();
    });

    // Fire initialization
    init();

    // Premium Performance Monitoring
    console.log('%c💳 NATER LEARNING HUB - Premium Payment Verification 💳', 'font-size: 24px; font-weight: bold; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-family: Space Grotesk;');
    console.log('%cWorld-Class Payment Authentication System', 'font-size: 16px; color: #d32f2f; font-family: Inter;');
</script>
