<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER HUB | Payment Verification</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --red: #d32f2f; --gold: #d4af37; --bg: #0a0a0a; }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 80px 20px; 
            overflow-x: hidden; 
            overflow-y: auto;   
            position: relative;
        }

        /* --- HIGH-INTENSITY CELESTIAL LOADER --- */
        #masterSyncScreen {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #2b0000 0%, #000 100%);
            z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .celestial-container { position: relative; width: 180px; height: 180px; margin-bottom: 40px; }
        .core-orb {
            position: absolute; inset: 15%; background: #b71c1c; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #FFD700;
            font-size: 3.5rem; z-index: 5;
            box-shadow: 0 0 80px #ff1a1a, inset 0 0 30px rgba(255,255,255,0.9);
            animation: corePlumbing 1.2s infinite alternate ease-in-out;
        }
        .star-layer {
            position: absolute; inset: -20px; border: 6px solid transparent; border-radius: 50%;
            animation: rotateStar 2s linear infinite;
        }
        .refractive { 
            border-top: 8px solid var(--gold); border-bottom: 8px solid var(--gold); 
            filter: blur(1px) drop-shadow(0 0 40px var(--gold));
            animation-duration: 1.5s;
        }
        .reflective { 
            border-left: 8px solid #fff; border-right: 8px solid #fff; 
            opacity: 0.9; filter: drop-shadow(0 0 50px #fff);
            animation-direction: reverse; animation-duration: 3s;
        }
        .shining-flares {
            position: absolute; inset: -50px; border: 3px dashed rgba(255,255,255,0.5);
            border-radius: 50%; animation: rotateStar 10s linear infinite;
            filter: blur(2px);
        }
        .audio-toggle {
            position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.1);
            border: 1px solid var(--gold); color: var(--gold); border-radius: 50px;
            padding: 8px 20px; font-size: 12px; font-weight: 800; cursor: pointer;
            z-index: 100000; transition: 0.3s;
        }
        .sync-text { text-align: center; font-family: 'Cinzel', serif; z-index: 10; }
        .main-msg { display: block; color: #fff; font-size: 1.6rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 12px; animation: flashGlow 0.8s infinite alternate; }
        .sub-msg { color: #aaa; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        @keyframes rotateStar { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.5); } 100% { transform: rotate(360deg) scale(1); } }
        @keyframes corePlumbing { from { transform: scale(1) rotate(0deg); filter: brightness(1); } to { transform: scale(1.5) rotate(20deg); filter: brightness(2); } }
        @keyframes flashGlow { from { opacity: 0.3; text-shadow: 0 0 5px #fff; } to { opacity: 1; text-shadow: 0 0 30px #fff, 0 0 50px var(--gold); } }

        /* --- INSTANT LOAD STRATEGY --- */
        .verify-card { 
            opacity: 0;
            transition: opacity 0.6s ease-in;
            max-width: 550px; width: 100%; background: rgba(15, 15, 15, 0.9); 
            border: 3px solid var(--gold); border-radius: 35px; padding: 50px 40px; 
            text-align: center; box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(15px); position: relative;
        }
        body.data-ready .verify-card { opacity: 1; }
        
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%); }
        .reflective-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(211, 47, 47, 0.08) 0%, transparent 40%); z-index: -1; pointer-events: none; }

        .brand-nater { font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
        .brand-hub { font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.2rem; color: var(--red); letter-spacing: 4px; text-transform: uppercase; }
        .brand-tagline { letter-spacing: 3px; color: #aaa; font-weight: bold; font-size: 0.75rem; margin-top: -5px; text-transform: uppercase; margin-bottom: 30px; }

        .id-input-field { 
            background: #000; border: 2px solid #333; border-radius: 15px; 
            padding: 15px 20px; color: white; width: 100%; text-align: center; 
            font-family: monospace; letter-spacing: 2px; margin-bottom: 20px;
            font-size: 1.2rem; transition: 0.3s;
        }
        .id-input-field:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        .btn-verify { 
            background: var(--gold); color: black; font-weight: 900; border-radius: 15px; 
            padding: 15px; width: 100%; border: none; font-size: 1.1rem; 
            transition: 0.3s; letter-spacing: 1px; cursor: pointer;
        }
        .btn-verify:hover { background: white; transform: translateY(-3px); }

        .top-nav { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 10; }
    </style>
</head>
<body>

<div id="masterSyncScreen">
    <button class="audio-toggle" onclick="toggleAudio()"><i class="fas fa-volume-up" id="volIcon"></i> MUTE AUDIO</button>
    <div class="celestial-container">
        <div class="shining-flares"></div>
        <div class="star-layer refractive"></div>
        <div class="star-layer reflective"></div>
        <div class="core-orb"><i class="fas fa-shield-alt"></i></div>
    </div>
    <div class="sync-text">
        <span class="main-msg">SECURE HANDSHAKE</span>
        <span class="sub-msg">Authenticating Payment Gateway Protocols...</span>
    </div>
</div>

<audio id="syncVoice" loop preload="auto">
    <source src="https://www.soundjay.com/buttons/sounds/button-20.mp3" type="audio/mpeg">
</audio>
<audio id="shimmerReveal" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-01.mp3" type="audio/mpeg">
</audio>

<canvas id="starCanvas"></canvas>
<div class="reflective-glow"></div>

<div class="top-nav">
    <button class="btn btn-outline-warning btn-sm rounded-pill px-3 fw-bold" onclick="window.location.href='academy.html'">
        <i class="fas fa-arrow-left me-2"></i> BACK
    </button>
</div>

<div class="verify-card">
    <div class="mb-1">
        <span class="brand-nater site-nater">NATER</span><span class="brand-hub site-hub"> HUB</span>
    </div>
    <div class="brand-tagline dynamic-site-tagline">SECURE PRODUCTION PORTAL</div>

    <h4 class="fw-bold mb-3">Manual Enrollment</h4>
    <p class="text-muted small mb-4">If your course didn't unlock automatically, enter your Paystack Reference ID below to sync your credentials.</p>

    <div class="manual-box">
        <input type="text" id="refInput" class="id-input-field" placeholder="e.g. T7382910X">
        <button class="btn-verify" id="verifyBtn" onclick="verifyRef()">
            <i class="fas fa-shield-check me-2"></i> UNLOCK MY COURSE
        </button>
    </div>

    <div id="status" class="mt-4 small fw-bold"></div>
</div>

<script>
    // 1. INSTANT NETWORK HANDSHAKE
    const dataPromise = fetch('/api/public-settings').then(res => res.json()).catch(() => ({ success: false }));

    // AUDIO SYSTEM
    const vAudio = document.getElementById('syncVoice');
    const sReveal = document.getElementById('shimmerReveal');
    let isMuted = false;
    function toggleAudio() {
        isMuted = !isMuted; vAudio.muted = isMuted;
        document.getElementById('volIcon').className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
    }
    window.addEventListener('click', () => { if(!isMuted && vAudio.paused) vAudio.play().catch(()=>{}); }, { once: false });

    async function init() {
        initStars();
        animateStars();
        vAudio.play().catch(()=>{});

        try {
            const data = await dataPromise;
            if(data.success) {
                const nameParts = (data.siteName || 'NATER HUB').split(' ');
                document.querySelectorAll('.site-nater').forEach(el => el.innerText = nameParts[0]);
                document.querySelectorAll('.site-hub').forEach(el => el.innerText = " " + nameParts.slice(1).join(' '));
                if(data.tagline) document.querySelector('.dynamic-site-tagline').innerText = data.tagline;
            }
        } finally {
            // Dismiss loader and reveal page
            setTimeout(() => {
                if(!isMuted) sReveal.play().catch(()=>{});
                vAudio.pause();
                const loader = document.getElementById('masterSyncScreen');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.body.classList.add('data-ready');
                }, 800);
            }, 3000);
        }
    }

    // ORIGINAL VERIFICATION LOGIC (RESTORED)
    async function verifyRef() {
        const ref = document.getElementById('refInput').value.trim();
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status');
        
        if(!ref) return Swal.fire('Error', 'Please enter your Reference ID', 'error');

        const token = localStorage.getItem('token');
        if (!token) return Swal.fire('Error', 'Session expired. Please login again.', 'error');

        let email;
        try {
            const student = JSON.parse(atob(token.split('.')[1]));
            email = student.email;
        } catch (e) {
            return Swal.fire('Error', 'Invalid session. Please login again.', 'error');
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> AUTHENTICATING...';
        
        try {
            const response = await fetch('/api/paystack/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reference: ref, email: email })
            });
            const data = await response.json();

            if(data.success) {
                status.style.color = "#28a745";
                status.innerHTML = `<i class="fas fa-check-circle me-2"></i> ENROLLMENT SUCCESSFUL!`;
                Swal.fire({
                    icon: 'success',
                    title: 'ACCESS GRANTED!',
                    text: 'Your course has been manually unlocked.',
                    confirmButtonColor: '#d4af37'
                }).then(() => window.location.href = 'academy.html');
            } else {
                throw new Error(data.message || 'Reference ID not found or already used.');
            }
        } catch (error) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-shield-check me-2"></i> UNLOCK MY COURSE';
            status.style.color = "#d32f2f";
            status.innerText = "❌ " + error.message;
            Swal.fire('Verification Failed', error.message, 'error');
        }
    }

    // STAR ENGINE (RESTORED)
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, o:Math.random()});
    }
    function animateStars() {
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white";
        stars.forEach(s => { ctx.globalAlpha = s.o; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y -= 0.3; if(s.y < 0) s.y = canvas.height; });
        requestAnimationFrame(animateStars);
    }

    init(); // Fire immediately
</script>
</body>
</html>
