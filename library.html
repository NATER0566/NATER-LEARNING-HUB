<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER LEARNING HUB | Premium Resource Library</title>
    
    <!-- Enhanced Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com https://docs.google.com https://drive.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://api.naterhub.com https://docs.google.com https://drive.google.com; media-src 'self' blob:; object-src 'none';">
    
    <meta name="theme-color" content="#d32f2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NATER HUB">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --brand-primary: #d32f2f; 
            --brand-dark: #b71c1c; 
            --brand-darker: #8b0000;
            --brand-light: #ffcdd2;
            --accent-gold: #FFD700;
            --accent-platinum: #e5e4e2;
            
            /* Premium Gradients */
            --gradient-primary: linear-gradient(135deg, #d32f2f 0%, #b71c1c 50%, #8b0000 100%);
            --gradient-gold: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            --gradient-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            --gradient-library: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            /* Shadows */
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-xl: 0 16px 40px rgba(0,0,0,0.16);
            --shadow-premium: 0 20px 60px rgba(211, 47, 47, 0.15);
            --shadow-gold: 0 20px 60px rgba(255, 215, 0, 0.2);
            
            /* Typography */
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-brand: 'Cinzel', serif;
        }

        [data-theme="dark"] {
            --gradient-card: linear-gradient(135deg, rgba(30,30,30,0.95) 0%, rgba(20,20,20,0.85) 100%);
            --gradient-library: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
        }

        body { 
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 50%, #d32f2f 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%);
        }

        /* Premium Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(211, 47, 47, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(211, 47, 47, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Premium Header */
        .library-header {
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-nater {
            font-family: var(--font-brand);
            font-weight: 900;
            color: var(--accent-gold);
            letter-spacing: 4px;
            font-size: 2rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: brandGlow 3s ease-in-out infinite alternate;
        }

        .brand-hub {
            font-family: var(--font-brand);
            font-weight: 900;
            color: var(--brand-primary);
            letter-spacing: 4px;
            font-size: 2rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: brandGlow 3s ease-in-out infinite alternate;
        }

        @keyframes brandGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-btn {
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            color: var(--brand-primary);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-family: var(--font-primary);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-premium);
            background: var(--gradient-primary);
            color: white;
            border-color: var(--brand-primary);
        }

        /* Premium Search Section */
        .search-section {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .search-container {
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow-premium);
            position: relative;
            overflow: hidden;
        }

        .search-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .search-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--brand-primary);
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .search-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .search-input-wrapper {
            position: relative;
            z-index: 1;
        }

        .search-input {
            width: 100%;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px 16px 60px;
            color: #333;
            font-size: 16px;
            font-family: var(--font-primary);
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }

        .search-input::placeholder {
            color: #999;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.1), var(--shadow-md);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-gold);
            font-size: 18px;
            pointer-events: none;
        }

        .filter-select {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            color: #333;
            font-size: 16px;
            font-family: var(--font-primary);
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255,255,255,0.95);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.1), var(--shadow-md);
        }

        .search-btn {
            background: var(--gradient-gold);
            color: #000;
            border: none;
            border-radius: 16px;
            padding: 16px 32px;
            font-weight: 700;
            font-family: var(--font-display);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-gold);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .search-btn:hover::before {
            left: 100%;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 80px rgba(255, 215, 0, 0.4);
        }

        /* Premium Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-gold);
        }

        .stat-icon {
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: 12px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 800;
            color: var(--brand-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Premium Library Grid */
        .library-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        /* Premium Resource Card */
        .resource-card {
            background: var(--gradient-library);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            position: relative;
            backdrop-filter: blur(20px);
        }

        .resource-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient-primary);
            transition: height 0.3s;
        }

        .resource-card:hover::before {
            height: 8px;
        }

        .resource-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: var(--shadow-premium);
            border-color: var(--brand-primary);
        }

        .resource-preview {
            position: relative;
            height: 200px;
            overflow: hidden;
            background: var(--gradient-dark);
        }

        .resource-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        .resource-type-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--gradient-primary);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            font-family: var(--font-primary);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .resource-content {
            padding: 24px;
        }

        .resource-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .resource-size {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .resource-date {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .resource-description {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-actions {
            display: flex;
            gap: 12px;
        }

        .resource-btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-family: var(--font-primary);
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .resource-btn-preview {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .resource-btn-download {
            background: var(--gradient-gold);
            color: #000;
            box-shadow: var(--shadow-sm);
        }

        .resource-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .resource-btn:hover::before {
            left: 100%;
        }

        .resource-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Premium Modal */
        .preview-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            backdrop-filter: blur(20px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            max-height: 800px;
            background: var(--gradient-card);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-premium);
            margin: 5vh auto;
        }

        .modal-header {
            background: var(--gradient-primary);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .modal-body {
            height: calc(100% - 80px);
            padding: 24px;
            overflow: auto;
        }

        .preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            background: white;
        }

        /* Premium Loading States */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 20000;
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .premium-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255,255,255,0.1);
            border-top: 8px solid var(--accent-gold);
            border-radius: 50%;
            animation: premiumSpin 1s linear infinite;
            margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        @keyframes premiumSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--accent-gold);
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }

        .empty-icon {
            font-size: 5rem;
            color: var(--brand-primary);
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .empty-text {
            font-size: 1.1rem;
            color: #999;
            margin-bottom: 24px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .brand-nater, .brand-hub {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }

            .library-grid {
                grid-template-columns: 1fr;
                padding: 0 16px;
            }

            .search-container {
                padding: 24px;
            }

            .modal-content {
                width: 95%;
                height: 90vh;
                margin: 5vh auto;
            }
        }

        /* Premium Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }

        /* Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--glass-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--brand-primary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-dark);
        }

        /* Premium Loading Shimmer */
        .loading-shimmer {
            background: linear-gradient(90deg, var(--glass-bg) 25%, rgba(255,255,255,0.1) 50%, var(--glass-bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body data-theme="light" oncontextmenu="return false;" onkeydown="return disableShortcuts(event)">

<!-- Premium Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="premium-spinner"></div>
    <div class="loading-text">LOADING RESOURCES...</div>
</div>

<!-- Premium Header -->
<header class="library-header">
    <div class="header-content">
        <div class="brand-logo">
            <span class="brand-nater">NATER</span>
            <span class="brand-hub">LEARNING HUB</span>
        </div>
        <div class="header-actions">
            <a href="dashboard.html" class="header-btn">
                <i class="fa-solid fa-th-large"></i>
                DASHBOARD
            </a>
            <a href="academy.html" class="header-btn">
                <i class="fa-solid fa-graduation-cap"></i>
                ACADEMY
            </a>
        </div>
    </div>
</header>

<!-- Premium Search Section -->
<section class="search-section fade-in-up">
    <div class="search-container">
        <h2 class="search-title">
            <i class="fa-solid fa-book-open me-3"></i>Premium Resource Library
        </h2>
        
        <div class="search-grid">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search for resources, documents, videos...">
            </div>
            <select id="categoryFilter" class="filter-select">
                <option value="all">All Categories</option>
                <option value="pdf">PDF Documents</option>
                <option value="video">Video Resources</option>
                <option value="presentation">Presentations</option>
                <option value="document">Documents</option>
            </select>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fa-solid fa-file-pdf"></i>
                </div>
                <div class="stat-value" id="pdfCount">0</div>
                <div class="stat-label">PDF Files</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fa-solid fa-video"></i>
                </div>
                <div class="stat-value" id="videoCount">0</div>
                <div class="stat-label">Videos</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fa-solid fa-file-powerpoint"></i>
                </div>
                <div class="stat-value" id="presentationCount">0</div>
                <div class="stat-label">Presentations</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fa-solid fa-database"></i>
                </div>
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Resources</div>
            </div>
        </div>

        <button class="search-btn" onclick="searchResources()">
            <i class="fa-solid fa-search me-2"></i>SEARCH RESOURCES
        </button>
    </div>
</section>

<!-- Premium Library Section -->
<section class="library-section">
    <div id="libraryContent">
        <!-- Resources will be dynamically loaded here -->
    </div>
</section>

<!-- Premium Preview Modal -->
<div class="preview-modal" id="previewModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Resource Preview</h3>
            <button class="modal-close" onclick="closePreview()">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <iframe id="previewFrame" class="preview-frame" src=""></iframe>
        </div>
    </div>
</div>

<script>
    // Enhanced Security
    function disableShortcuts(e) { 
        if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u'))) {
            e.preventDefault();
            return false;
        }
    }

    // Premium Toast Notification
    const showToast = (icon, title, text = '') => {
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });
        Toast.fire({ 
            icon: icon, 
            title: title,
            text: text
        });
    };

    // State Management
    let allResources = [];
    let filteredResources = [];
    let currentFilter = 'all';
    let currentSearch = '';

    // Premium Initialization
    document.addEventListener('DOMContentLoaded', () => {
        loadResources();
        setupEventListeners();
        animateStats();
    });

    // Setup Event Listeners
    function setupEventListeners() {
        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            filterResources();
        });

        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            currentFilter = e.target.value;
            filterResources();
        });

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePreview();
            }
        });

        // Close modal on background click
        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target.id === 'previewModal') {
                closePreview();
            }
        });
    }

    // Load Resources
    async function loadResources() {
        showLoading();
        
        try {
            const response = await fetch('/api/library/all');
            const data = await response.json();
            
            if (Array.isArray(data)) {
                allResources = data.map((resource, index) => ({
                    id: resource.id || index + 1,
                    title: resource.title || `Resource ${index + 1}`,
                    type: resource.type || 'pdf',
                    size: resource.size || Math.floor(Math.random() * 10000) + ' KB',
                    date: resource.date || new Date().toLocaleDateString(),
                    description: resource.description || 'Premium educational resource for enhanced learning experience.',
                    url: resource.url || '#',
                    category: resource.category || 'document'
                }));
                
                filteredResources = [...allResources];
                updateStats();
                renderResources();
            } else {
                // Fallback demo data
                loadDemoResources();
            }
        } catch (error) {
            console.error('Resource loading error:', error);
            loadDemoResources();
        } finally {
            hideLoading();
        }
    }

    // Load Demo Resources
    function loadDemoResources() {
        allResources = [
            {
                id: 1,
                title: 'Advanced JavaScript Programming Guide',
                type: 'pdf',
                size: '2.5 MB',
                date: '2024-01-15',
                description: 'Comprehensive guide covering modern JavaScript concepts, ES6+ features, and best practices for professional development.',
                url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
                category: 'pdf'
            },
            {
                id: 2,
                title: 'Web Development Masterclass',
                type: 'video',
                size: '125 MB',
                date: '2024-01-20',
                description: 'Complete video course on HTML5, CSS3, and responsive web design techniques.',
                url: 'https://www.w3schools.com/html/mov_bbb.mp4',
                category: 'video'
            },
            {
                id: 3,
                title: 'Data Structures & Algorithms',
                type: 'presentation',
                size: '5.8 MB',
                date: '2024-01-25',
                description: 'Detailed presentation on fundamental data structures and algorithmic problem-solving techniques.',
                url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
                category: 'presentation'
            },
            {
                id: 4,
                title: 'Python Programming Essentials',
                type: 'pdf',
                size: '3.2 MB',
                date: '2024-02-01',
                description: 'Essential Python programming guide covering syntax, data types, and object-oriented programming.',
                url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
                category: 'pdf'
            },
            {
                id: 5,
                title: 'Machine Learning Fundamentals',
                type: 'document',
                size: '4.7 MB',
                date: '2024-02-05',
                description: 'Introduction to machine learning concepts, algorithms, and practical applications.',
                url: 'https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf',
                category: 'document'
            },
            {
                id: 6,
                title: 'React.js Complete Tutorial',
                type: 'video',
                size: '98 MB',
                date: '2024-02-10',
                description: 'Comprehensive React.js tutorial from basics to advanced concepts including hooks and state management.',
                url: 'https://www.w3schools.com/html/mov_bbb.mp4',
                category: 'video'
            }
        ];
        
        filteredResources = [...allResources];
        updateStats();
        renderResources();
    }

    // Filter Resources
    function filterResources() {
        filteredResources = allResources.filter(resource => {
            const matchesSearch = !currentSearch || 
                resource.title.toLowerCase().includes(currentSearch) ||
                resource.description.toLowerCase().includes(currentSearch);
            
            const matchesCategory = currentFilter === 'all' || resource.category === currentFilter;
            
            return matchesSearch && matchesCategory;
        });
        
        renderResources();
    }

    // Search Resources
    function searchResources() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        filterResources();
        showToast('info', 'Search Complete', `Found ${filteredResources.length} resources`);
    }

    // Update Statistics
    function updateStats() {
        const stats = {
            pdf: allResources.filter(r => r.type === 'pdf').length,
            video: allResources.filter(r => r.type === 'video').length,
            presentation: allResources.filter(r => r.type === 'presentation').length,
            total: allResources.length
        };

        animateCounter('pdfCount', stats.pdf);
        animateCounter('videoCount', stats.video);
        animateCounter('presentationCount', stats.presentation);
        animateCounter('totalCount', stats.total);
    }

    // Animate Counter
    function animateCounter(elementId, targetValue) {
        const element = document.getElementById(elementId);
        const duration = 2000;
        const step = targetValue / (duration / 16);
        let current = 0;
        
        const timer = setInterval(() => {
            current += step;
            if (current >= targetValue) {
                current = targetValue;
                clearInterval(timer);
            }
            element.innerText = Math.floor(current);
        }, 16);
    }

    // Render Resources
    function renderResources() {
        const container = document.getElementById('libraryContent');
        
        if (filteredResources.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <i class="fa-solid fa-folder-open"></i>
                    </div>
                    <div class="empty-title">No Resources Found</div>
                    <div class="empty-text">Try adjusting your search or filter criteria</div>
                </div>
            `;
            return;
        }

        const resourcesHTML = filteredResources.map((resource, index) => `
            <div class="resource-card fade-in-up" style="animation-delay: ${index * 0.1}s;" onclick="previewResource('${resource.url}', '${resource.title}', '${resource.type}')">
                <div class="resource-preview">
                    <div class="resource-icon">
                        <i class="fa-solid ${getResourceIcon(resource.type)}"></i>
                    </div>
                    <div class="resource-type-badge">${resource.type.toUpperCase()}</div>
                </div>
                <div class="resource-content">
                    <h3 class="resource-title">${resource.title}</h3>
                    <div class="resource-meta">
                        <span class="resource-size">
                            <i class="fa-solid fa-database me-1"></i>${resource.size}
                        </span>
                        <span class="resource-date">
                            <i class="fa-solid fa-calendar me-1"></i>${resource.date}
                        </span>
                    </div>
                    <p class="resource-description">${resource.description}</p>
                    <div class="resource-actions">
                        <button class="resource-btn resource-btn-preview" onclick="event.stopPropagation(); previewResource('${resource.url}', '${resource.title}', '${resource.type}')">
                            <i class="fa-solid fa-eye me-1"></i>PREVIEW
                        </button>
                        <button class="resource-btn resource-btn-download" onclick="event.stopPropagation(); downloadResource('${resource.url}', '${resource.title}')">
                            <i class="fa-solid fa-download me-1"></i>DOWNLOAD
                        </button>
                    </div>
                </div>
            </div>
        `).join('');

        container.innerHTML = `
            <h2 class="section-title">
                <i class="fa-solid fa-folder me-2"></i>
                Available Resources (${filteredResources.length})
            </h2>
            <div class="library-grid">
                ${resourcesHTML}
            </div>
        `;
    }

    // Get Resource Icon
    function getResourceIcon(type) {
        const icons = {
            pdf: 'fa-file-pdf',
            video: 'fa-video',
            presentation: 'fa-file-powerpoint',
            document: 'fa-file-alt'
        };
        return icons[type] || 'fa-file';
    }

    // Preview Resource
    function previewResource(url, title, type) {
        const modal = document.getElementById('previewModal');
        const frame = document.getElementById('previewFrame');
        const modalTitle = document.getElementById('modalTitle');
        
        modalTitle.innerText = title;
        
        if (type === 'pdf') {
            frame.src = `https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(url)}`;
        } else {
            frame.src = url;
        }
        
        modal.style.display = 'flex';
        showToast('info', 'Preview Loaded', `Opening ${title} preview`);
    }

    // Close Preview
    function closePreview() {
        const modal = document.getElementById('previewModal');
        const frame = document.getElementById('previewFrame');
        
        modal.style.display = 'none';
        frame.src = '';
    }

    // Download Resource
    function downloadResource(url, title) {
        showLoading();
        
        // Create download link
        const link = document.createElement('a');
        link.href = url;
        link.download = title;
        link.target = '_blank';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        setTimeout(() => {
            hideLoading();
            showToast('success', 'Download Started', `Downloading ${title}`);
        }, 1000);
    }

    // Loading Functions
    function showLoading() {
        document.getElementById('loadingOverlay').style.display = 'flex';
    }

    function hideLoading() {
        document.getElementById('loadingOverlay').style.display = 'none';
    }

    // Animate Stats on Load
    function animateStats() {
        document.querySelectorAll('.stat-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, index * 100);
        });
    }

    // Premium Security Enhancements
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
            e.preventDefault();
            return false;
        }
    });

    // Premium Performance Monitoring
    console.log('%c📚 NATER LEARNING HUB - Premium Resource Library 📚', 'font-size: 24px; font-weight: bold; color: #d32f2f; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-family: Space Grotesk;');
    console.log('%cWorld-Class Resource Management System', 'font-size: 16px; color: #FFD700; font-family: Inter;');
</script>

<style>
    /* Premium SweetAlert2 Customization */
    .swal2-popup {
        border-radius: 20px;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(20px);
        background: var(--gradient-card);
    }

    .swal2-title {
        font-family: var(--font-display);
        color: var(--brand-primary);
    }

    .swal2-confirm {
        background: var(--gradient-primary);
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-family: var(--font-primary);
    }

    /* Premium Touch Support */
    @media (hover: none) {
        .resource-card:active {
            transform: scale(0.98);
        }
        
        .header-btn:active {
            transform: scale(0.95);
        }
        
        .search-btn:active {
            transform: scale(0.95);
        }
    }
</style>
</body>
</html>
