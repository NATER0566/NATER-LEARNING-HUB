<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NATER'S AI | Elite Intelligence</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { 
            --red: #ff0000; --gold: #FFD700; --gold-grad: linear-gradient(135deg, #FFD700 0%, #b8860b 100%);
            --pure-black: #080808; --user-bg: #232323; 
        }

        html, body { 
            background: var(--pure-black); margin: 0; padding: 0; 
            height: 100dvh; width: 100%; overflow: hidden; display: flex; flex-direction: column;
            font-family: 'Montserrat', sans-serif;
        }

        .chat-header { 
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            padding: 15px 20px; border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }

        .brand-container { text-align: center; flex-grow: 1; }
        .brand-nater { font-family: 'Cinzel', serif; color: var(--gold); font-weight: 900; font-size: 1.6rem; letter-spacing: 2px; }
        .brand-ai { font-family: 'Cinzel', serif; color: var(--red); font-weight: 900; font-size: 1.6rem; }

        #chatBox { 
            flex-grow: 1; overflow-y: auto; padding: 20px 0; 
            display: flex; flex-direction: column; 
            background: radial-gradient(circle at center, #111 0%, #080808 100%);
            scrollbar-width: none;
        }
        #chatBox::-webkit-scrollbar { display: none; }

        .message-row { width: 100%; display: flex; padding: 12px 20px; margin: 0 auto; max-width: 850px; }
        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        .msg { max-width: 85%; padding: 12px 20px; font-size: 1rem; line-height: 1.6; font-weight: 600; border-radius: 18px; }
        .msg.user { background: var(--user-bg); color: #ffffff; border: 1px solid rgba(255,255,255,0.1); }
        .msg.ai { background: transparent; color: #f0f0f0; padding-left: 0; }

        .ai-icon-circle {
            width: 35px; height: 35px; background: #000; border: 2px solid var(--gold); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; color: var(--gold);
        }

        .input-wrapper { width: 100%; max-width: 850px; margin: 0 auto; padding: 10px 15px 30px 15px; flex-shrink: 0; }
        .input-container { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; display: flex; align-items: flex-end; padding: 10px 14px; }
        #userInput { background: transparent; border: none; color: #fff !important; flex: 1; outline: none; padding: 8px; font-size: 1.05rem; max-height: 150px; overflow-y: auto; font-weight: 600; }

        .action-btn { background: transparent; border: none; color: #888; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .send-btn { background: var(--gold-grad); color: #000 !important; border-radius: 12px; margin-left: 8px; width: 40px; height: 40px; opacity: 0.3; }
        .send-btn.active { opacity: 1; cursor: pointer; }

        .header-action { color: #666; cursor: pointer; transition: 0.3s; }
        .header-action:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-arrow-left header-action fa-lg" onclick="history.back()"></i>
        <div class="brand-container">
            <span class="brand-nater">NATER'S</span> <span class="brand-ai">AI</span>
        </div>
        <div class="d-flex gap-3">
            <i class="fas fa-trash-alt header-action" title="Clear Chat" onclick="confirmClear()"></i>
            <i class="fas fa-volume-up header-action" id="muteBtn" onclick="toggleMute()"></i>
        </div>
    </div>

    <div id="chatBox"></div>

    <div id="typingIndicator" style="display:none; color:var(--gold); padding:0 30px 10px; font-weight:700; font-size:12px;">
        <i class="fas fa-bolt fa-pulse"></i> SYNCING BRAIN...
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <label for="fileInput" class="action-btn"><i class="fas fa-plus-circle"></i></label>
            <input type="file" id="fileInput" hidden onchange="handleFile(this)">
            <textarea id="userInput" placeholder="Message the Hub Genius..." rows="1" oninput="toggleBtn()"></textarea>
            <button class="action-btn" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
            <button class="action-btn send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>

<script>
    let isMuted = false;
    let hasInteracted = false;
    let chatHistory = []; // Short-term memory
    const welcomeMsg = "Greetings, Genius. I am the Elite Intelligence of Nater's Hub. How can I facilitate your excellence today?";

    (function initASAP() {
        appendMsg(welcomeMsg, 'ai');
    })();

    function speak(text) {
        if(isMuted || !hasInteracted) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
    }

    document.addEventListener('click', () => {
        if(!hasInteracted) { hasInteracted = true; speak(welcomeMsg); }
    }, { once: true });

    function toggleBtn() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        btn.classList.toggle('active', input.value.trim().length > 0);
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
    }

    // --- CLEAR CHAT LOGIC ---
    function confirmClear() {
        Swal.fire({
            title: 'Clear Session?',
            text: "This will wipe the current screen and reset AI memory.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff0000',
            confirmButtonText: 'Yes, Reset'
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('chatBox').innerHTML = '';
                chatHistory = [];
                appendMsg(welcomeMsg, 'ai');
            }
        });
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        let userName = "Genius", userEmail = "student";
        try {
            const token = localStorage.getItem('token');
            if (token) {
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload.name;
                userEmail = payload.email;
            }
        } catch(e) {}

        appendMsg(text, 'user');
        // Add to history for memory
        chatHistory.push({ role: 'user', content: text });
        
        input.value = '';
        input.style.height = 'auto';
        toggleBtn();
        document.getElementById('typingIndicator').style.display = 'block';

        try {
            const res = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: text, 
                    email: userEmail, 
                    name: userName,
                    history: chatHistory.slice(-6) // Send only last 6 messages for precision
                })
            });
            const data = await res.json();
            document.getElementById('typingIndicator').style.display = 'none';
            
            appendMsg(data.reply, 'ai');
            chatHistory.push({ role: 'assistant', content: data.reply });
            speak(data.reply);
        } catch (e) {
            document.getElementById('typingIndicator').style.display = 'none';
            appendMsg("Sync Error.", 'ai');
        }
    }

    function appendMsg(text, type) {
        const box = document.getElementById('chatBox');
        const row = document.createElement('div');
        row.className = `message-row ${type}`;
        row.innerHTML = type === 'ai' ? 
            `<div class="ai-icon-circle"><i class="fas fa-bolt"></i></div><div class="msg ai">${text.replace(/\n/g, '<br>')}</div>` :
            `<div class="msg user">${text.replace(/\n/g, '<br>')}</div>`;
        box.appendChild(row);
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    }

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('muteBtn').className = isMuted ? "fas fa-volume-mute fa-lg" : "fas fa-volume-up fa-lg";
        if(isMuted) window.speechSynthesis.cancel();
    }

    function toggleMic() {
        if (!('webkitSpeechRecognition' in window)) return alert("Unsupported");
        const rec = new webkitSpeechRecognition();
        rec.onstart = () => document.getElementById('micBtn').style.color = "red";
        rec.onend = () => document.getElementById('micBtn').style.color = "#888";
        rec.onresult = (e) => {
            document.getElementById('userInput').value = e.results[0][0].transcript;
            toggleBtn();
            sendMessage();
        };
        rec.start();
    }
</script>
</body>
</html>
