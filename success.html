    <style>
        :root { 
            --brand-primary: #d32f2f; 
            --brand-dark: #b71c1c; 
            --brand-darker: #8b0000;
            --brand-light: #ffcdd2;
            --accent-gold: #FFD700;
            --accent-platinum: #e5e4e2;
            
            /* Premium Gradients */
            --gradient-primary: linear-gradient(135deg, #d32f2f 0%, #b71c1c 50%, #8b0000 100%);
            --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            --gradient-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            /* Shadows */
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-xl: 0 16px 40px rgba(0,0,0,0.16);
            --shadow-premium: 0 20px 60px rgba(211, 47, 47, 0.15);
            
            /* Typography */
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            
            /* Spacing */
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.5rem;
            --spacing-md: 1rem;
            --spacing-lg: 1.5rem;
            --spacing-xl: 2rem;
            --spacing-2xl: 3rem;
        }

        [data-theme="dark"] {
            --gradient-card: linear-gradient(135deg, rgba(30,30,30,0.95) 0%, rgba(20,20,20,0.85) 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        * {
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
        }

        body { 
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 50%, #d32f2f 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%);
        }

        /* Premium Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(211, 47, 47, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 123, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Premium Logo Section */
        .logo-section {
            text-align: center;
            margin: var(--spacing-xl) 0;
            animation: fadeInUp 1s ease-out;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--accent-gold);
            box-shadow: var(--shadow-premium);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            padding: 8px;
        }

        .logo-img:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 25px 80px rgba(211, 47, 47, 0.25);
        }

        /* Premium Content Section */
        .success-container {
            max-width: 600px;
            margin: 0 auto;
            padding: var(--spacing-2xl);
            background: var(--gradient-card);
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.8s ease-out;
        }

        .success-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--accent-gold), transparent);
            animation: rotate 20s linear infinite;
            opacity: 0.1;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-xl);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
            animation: pulse 2s infinite;
        }

        .success-icon i {
            color: white;
            font-size: 32px;
        }

        .success-title {
            font-family: var(--font-display);
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: var(--spacing-lg);
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .success-message {
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            color: #666;
            margin-bottom: var(--spacing-xl);
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-premium {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-family: var(--font-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-premium:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--gradient-glass);
            color: var(--brand-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: var(--gradient-card);
            transform: translateY(-2px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .success-container {
                margin: var(--spacing-lg);
                padding: var(--spacing-xl);
            }
            
            .success-title {
                font-size: 24px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn-premium {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="success-container">
            <!-- Premium Logo Section -->
            <div class="logo-section">
                <img src="logo.jpg" alt="NATER LEARNING HUB" class="logo-img" id="logoImage">
            </div>

            <!-- Success Icon -->
            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>

            <!-- Success Message -->
            <h1 class="success-title">SUCCESS!</h1>
            <p class="success-message">
                Your account has been successfully activated! You can now access all the premium features of NATER LEARNING HUB. 
                Thank you for joining our community of learners.
            </p>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="index.html" class="btn-premium btn-primary">
                    <i class="fa-solid fa-home"></i>
                    Go to Dashboard
                </a>
                <a href="academy.html" class="btn-premium btn-secondary">
                    <i class="fa-solid fa-graduation-cap"></i>
                    Browse Courses
                </a>
            </div>
        </div>
    </div>

    <script>
        // Enhanced Logo Loading
        document.addEventListener('DOMContentLoaded', function() {
            const logoImg = document.getElementById('logoImage');
            
            // Handle logo loading errors with multiple fallbacks
            logoImg.addEventListener('error', function() {
                console.log('Logo failed to load, trying fallback...');
                // Try absolute path first
                if (!this.src.includes('://') && !this.src.startsWith('/')) {
                    this.src = './logo.jpg';
                    return;
                }
                // Final fallback - create a branded SVG
                this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgdmlld0JveD0iMCAwIDEyMCAxMjAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEyMCIgaGVpZ2h0PSIxMjAiIGZpbGw9IiNkMzJmMmYiLz48dGV4dCB4PSI2MCIgeT0iNjAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiPk5BVEVSPC90ZXh0Pjwvc3ZnPg==';
            });

            // Logo loaded successfully
            logoImg.addEventListener('load', function() {
                console.log('Logo loaded successfully');
            });
            
            // Try to load logo immediately
            if (logoImg.src === '' || logoImg.src.includes('about:blank')) {
                logoImg.src = 'logo.jpg';
            }
        });

        // Auto-redirect after 10 seconds
        setTimeout(() => {
            Swal.fire({
                title: 'Redirecting...',
                text: 'Taking you to the dashboard...',
                icon: 'info',
                timer: 3000,
                timerProgressBar: true,
                showConfirmButton: false
            }).then(() => {
                window.location.href = 'index.html';
            });
        }, 10000);
    </script>
</body>
</html>
