<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Activated | NATER HUB ACADEMY</title>
    
    <meta name="theme-color" content="#b71c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --brand-red: #d32f2f; 
            --brand-dark: #b71c1c; 
            --owner-gold: #FFD700;
            --bg-color: #0f0f0f;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex; 
            justify-content: center;
            align-items: center; 
            padding: 40px 0;
        }

        .success-card {
            background: white;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 95%;
            overflow: hidden;
            border: 1px solid #eee;
            animation: fadeIn 0.8s ease-out;
        }

        .brand-header {
            background: var(--brand-dark);
            padding: 30px;
            border-bottom: 6px solid var(--owner-gold);
        }

        .brand-header h1 {
            color: white;
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-display {
            background: white;
            padding: 25px 0 10px 0;
        }

        .logo-display img {
            width: 250px;
            height: auto;
            display: inline-block;
        }

        .content-body { padding: 30px 40px 50px; }

        .success-mark {
            color: #28a745;
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        h2 {
            color: var(--brand-dark);
            font-weight: 800;
            margin-bottom: 15px;
            font-size: 28px;
            text-transform: uppercase;
        }

        p {
            color: #333;
            font-size: 17px;
            line-height: 1.8;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .btn-portal {
            background: var(--brand-dark);
            color: white !important;
            font-weight: 800;
            padding: 20px 50px;
            border-radius: 10px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            transition: 0.3s ease;
            font-size: 16px;
        }

        .btn-portal:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .footer-branding {
            background: #1a1a1a;
            padding: 30px;
            text-align: center;
            color: #aaa;
            font-size: 11px;
        }

        .footer-branding p {
            color: var(--owner-gold);
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="brand-header">
            <h1 id="siteNameDisplay">NATER HUB ACADEMY</h1>
        </div>

        <div class="logo-display">
            <img src="/logo.jpg" alt="Nater Academy">
        </div>

        <div class="content-body">
            <i class="fas fa-check-circle success-mark"></i>
            
            <h2>Account Activated</h2>
            
            <p>Congratulations! Your account at <strong id="siteNameBold">NATER HUB ACADEMY</strong> is now fully verified. Your high-performance learning journey begins right now.</p>
            
            <a href="/index.html" class="btn-portal">
                Access My Dashboard
            </a>
        </div>

        <div class="footer-branding">
            <p>SECURE GLOBAL PRODUCTION PORTAL</p>
            &copy; <span id="year"></span> NATER HUB ACADEMY. All Rights Reserved.
        </div>
    </div>

    <script>
        // --- ASAP LOGIC: Instant Data Sync without PWA ---
        (async function immediateSync() {
            // Fetch custom branding ASAP to match the user's specific Academy name
            try {
                const res = await fetch('/api/public-settings');
                const data = await res.json();
                if(data.success && data.siteName) {
                    document.getElementById('siteNameDisplay').innerText = data.siteName;
                    document.getElementById('siteNameBold').innerText = data.siteName;
                }
            } catch(e) { console.log("Branding sync skipped."); }
        })();

        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
