<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER LEARNING HUB | Secure Payment Verification</title>
    
    <!-- Enhanced Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://api.naterhub.com https://api.paystack.co;">
    
    <meta name="theme-color" content="#d32f2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NATER HUB">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --brand-primary: #d32f2f; 
            --brand-dark: #b71c1c; 
            --brand-darker: #8b0000;
            --brand-light: #ffcdd2;
            --accent-gold: #FFD700;
            --accent-platinum: #e5e4e2;
            
            --gradient-primary: linear-gradient(135deg, #d32f2f 0%, #b71c1c 50%, #8b0000 100%);
            --gradient-gold: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            --gradient-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-xl: 0 16px 40px rgba(0,0,0,0.16);
            --shadow-premium: 0 20px 60px rgba(211, 47, 47, 0.15);
            --shadow-gold: 0 20px 60px rgba(255, 215, 0, 0.2);
            
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-brand: 'Cinzel', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%);
            background-attachment: fixed;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 20px; 
            overflow-x: hidden; 
            position: relative;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(211, 47, 47, 0.1) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
        }

        /* Premium Verification Container */
        .verification-container {
            max-width: 700px;
            width: 100%;
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border: 5px solid var(--accent-gold);
            border-radius: 30px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 
                var(--shadow-gold),
                0 0 120px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .verification-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Premium Brand */
        .brand-container {
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .brand-nater {
            font-family: var(--font-brand);
            font-weight: 900;
            font-size: 2.5rem;
            color: var(--accent-gold);
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: brandGlow 3s ease-in-out infinite alternate;
        }

        .brand-hub {
            font-family: var(--font-brand);
            font-weight: 900;
            font-size: 2.5rem;
            color: var(--brand-primary);
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: brandGlow 3s ease-in-out infinite alternate;
        }

        @keyframes brandGlow {
            from { filter: brightness(1) drop-shadow(0 0 15px rgba(255, 215, 0, 0.4)); }
            to { filter: brightness(1.3) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6)); }
        }

        /* Premium Loader */
        .premium-loader {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            position: relative;
            z-index: 1;
        }

        .loader-core {
            position: absolute;
            inset: 20%;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 60px rgba(211, 47, 47, 0.8),
                inset 0 0 30px rgba(255, 215, 0, 0.4);
            animation: corePulse 2s infinite alternate ease-in-out;
        }

        .loader-ring {
            position: absolute;
            inset: -10px;
            border: 6px solid transparent;
            border-radius: 50%;
            animation: rotateRing 3s linear infinite;
        }

        .loader-ring.gold {
            border-top: 8px solid var(--accent-gold);
            border-bottom: 8px solid var(--accent-gold);
            filter: blur(1px) drop-shadow(0 0 40px var(--accent-gold));
            animation-duration: 2s;
        }

        .loader-ring.white {
            border-left: 8px solid #fff;
            border-right: 8px solid #fff;
            opacity: 0.9;
            filter: drop-shadow(0 0 50px #fff);
            animation-direction: reverse;
            animation-duration: 4s;
        }

        @keyframes rotateRing {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.5); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes corePulse {
            from { 
                transform: scale(1); 
                filter: brightness(1); 
            }
            to { 
                transform: scale(1.2); 
                filter: brightness(2); 
            }
        }

        .loader-icon {
            font-size: 3rem;
            color: var(--accent-gold);
        }

        /* Premium Status Text */
        .status-section {
            position: relative;
            z-index: 1;
        }

        .status-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: white;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { 
                opacity: 0.8; 
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); 
            }
            to { 
                opacity: 1; 
                text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px var(--accent-gold); 
            }
        }

        .status-subtitle {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Premium Info Box */
        .info-box {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
            position: relative;
            z-index: 1;
        }

        .info-label {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .info-value {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            word-break: break-all;
        }

        /* Premium Progress */
        .progress-container {
            margin: 30px 0;
            position: relative;
            z-index: 1;
        }

        .progress-label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar-container {
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            height: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--gradient-gold);
            border-radius: 12px;
            transition: width 0.5s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: progressShimmer 2s infinite;
        }

        @keyframes progressShimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Premium Security Badge */
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--gradient-glass);
            border: 2px solid var(--accent-gold);
            border-radius: 50px;
            padding: 12px 24px;
            margin: 20px 0;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .security-icon {
            font-size: 1.2rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .verification-container {
                padding: 40px 30px;
                margin: 20px;
            }

            .brand-nater, .brand-hub {
                font-size: 2rem;
            }

            .status-title {
                font-size: 1.6rem;
            }

            .premium-loader {
                width: 100px;
                height: 100px;
            }

            .loader-icon {
                font-size: 2.5rem;
            }
        }

        /* Premium Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 1s ease-out;
        }
    </style>
</head>
<body data-theme="dark" oncontextmenu="return false;" onkeydown="return disableShortcuts(event)">

<!-- Premium Verification Container -->
<div class="verification-container fade-in-up">
    <!-- Premium Brand -->
    <div class="brand-container">
        <span class="brand-nater">NATER</span>
        <span class="brand-hub">LEARNING HUB</span>
    </div>

    <!-- Premium Loader -->
    <div class="premium-loader">
        <div class="loader-ring gold"></div>
        <div class="loader-ring white"></div>
        <div class="loader-core">
            <i class="fa-solid fa-shield-halved loader-icon"></i>
        </div>
    </div>

    <!-- Status Section -->
    <div class="status-section">
        <h1 class="status-title" id="statusTitle">SECURELY VERIFYING TRANSACTION</h1>
        <p class="status-subtitle" id="statusSubtitle">Please wait while we authenticate your payment with our secure servers...</p>
    </div>

    <!-- Info Box -->
    <div class="info-box" id="infoBox" style="display: none;">
        <div class="info-label">Transaction Reference</div>
        <div class="info-value" id="referenceDisplay">---</div>
    </div>

    <!-- Progress Container -->
    <div class="progress-container">
        <div class="progress-label">Verification Progress</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
        </div>
    </div>

    <!-- Security Badge -->
    <div class="security-badge">
        <i class="fa-solid fa-lock security-icon"></i>
        <span>MILITARY-GRADE SECURITY</span>
    </div>
</div>

<script>
    // Enhanced Security
    function disableShortcuts(e) { 
        if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u'))) {
            e.preventDefault();
            return false;
        }
    }

    // State Management
    let verificationProgress = 0;
    let verificationSteps = [
        { progress: 20, title: "INITIALIZING SECURE CONNECTION", subtitle: "Establishing encrypted channel..." },
        { progress: 40, title: "AUTHENTICATING PAYMENT GATEWAY", subtitle: "Verifying transaction with Paystack..." },
        { progress: 60, title: "VALIDATING USER CREDENTIALS", subtitle: "Confirming student identity..." },
        { progress: 80, title: "PROCESSING ENROLLMENT", subtitle: "Activating course access..." },
        { progress: 100, title: "PAYMENT VERIFIED SUCCESSFULLY", subtitle: "Redirecting to your academy..." }
    ];
    let currentStep = 0;

    // Update Progress
    function updateProgress() {
        if (currentStep >= verificationSteps.length) return;

        const step = verificationSteps[currentStep];
        const progressBar = document.getElementById('progressBar');
        const statusTitle = document.getElementById('statusTitle');
        const statusSubtitle = document.getElementById('statusSubtitle');

        progressBar.style.width = step.progress + '%';
        statusTitle.innerText = step.title;
        statusSubtitle.innerText = step.subtitle;

        // Show reference after initial step
        if (currentStep === 1) {
            const urlParams = new URLSearchParams(window.location.search);
            const reference = urlParams.get('reference');
            if (reference) {
                document.getElementById('referenceDisplay').innerText = reference;
                document.getElementById('infoBox').style.display = 'block';
            }
        }

        currentStep++;
        verificationProgress = step.progress;

        // Continue to next step
        if (currentStep < verificationSteps.length) {
            setTimeout(updateProgress, 2000);
        } else {
            // Final verification
            setTimeout(verifyPayment, 1500);
        }
    }

    // Premium Payment Verification
    async function verifyPayment() {
        const urlParams = new URLSearchParams(window.location.search);
        const reference = urlParams.get('reference');
        
        const token = localStorage.getItem('token');
        if (!token || !reference) {
            return Swal.fire({
                title: 'Verification Failed',
                text: 'Missing required verification parameters. Redirecting...',
                icon: 'error',
                background: '#1a1a1a',
                color: '#fff',
                confirmButtonColor: '#d32f2f',
                timer: 3000,
                timerProgressBar: true
            }).then(() => {
                window.location.replace('academy.html');
            });
        }

        try {
            // Get user info from JWT
            const student = JSON.parse(atob(token.split('.')[1]));

            // Send verification request
            const response = await fetch('/api/paystack/verify', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    reference: reference,
                    email: student.email
                })
            });

            const result = await response.json();

            if (result.success) {
                // Success animation
                document.getElementById('statusTitle').innerText = 'PAYMENT CONFIRMED!';
                document.getElementById('statusSubtitle').innerText = 'Your course has been unlocked successfully!';
                document.getElementById('progressBar').style.width = '100%';

                Swal.fire({
                    icon: 'success',
                    title: '🎉 PAYMENT VERIFIED!',
                    text: 'Your enrollment has been confirmed. Welcome to NATER LEARNING HUB!',
                    background: '#1a1a1a',
                    color: '#fff',
                    confirmButtonColor: '#FFD700',
                    confirmButtonText: 'CONTINUE TO ACADEMY',
                    showClass: {
                        popup: 'animate__animated animate__fadeInDown'
                    },
                    hideClass: {
                        popup: 'animate__animated animate__fadeOutUp'
                    }
                }).then(() => {
                    window.location.href = 'academy.html';
                });
            } else {
                throw new Error(result.message || "Payment verification failed");
            }
        } catch (err) {
            console.error("Verification error:", err);
            
            // Update UI to show error
            document.getElementById('statusTitle').innerText = 'VERIFICATION FAILED';
            document.getElementById('statusSubtitle').innerText = 'We could not verify your payment automatically.';
            document.getElementById('progressBar').style.background = 'linear-gradient(135deg, #f44336 0%, #d32f2f 100%)';

            Swal.fire({
                icon: 'error',
                title: '❌ VERIFICATION ERROR',
                text: `We could not verify your payment automatically. Please contact support with your reference: ${reference}`,
                background: '#1a1a1a',
                color: '#fff',
                confirmButtonColor: '#d32f2f',
                confirmButtonText: 'CONTACT SUPPORT',
                showCancelButton: true,
                cancelButtonText: 'TRY AGAIN',
                cancelButtonColor: '#666'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Redirect to support or contact page
                    window.location.href = 'mailto:support@naterhub.com?subject=Payment Verification Issue&body=Reference: ' + reference;
                } else {
                    // Retry verification
                    window.location.reload();
                }
            });
        }
    }

    // Premium Initialization
    window.onload = () => {
        // Start progress animation
        setTimeout(updateProgress, 1000);
    };

    // Premium Security Enhancements
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
            e.preventDefault();
            return false;
        }
    });

    // Premium Performance Monitoring
    console.log('%c💳 NATER LEARNING HUB - Premium Payment Verification 💳', 'font-size: 28px; font-weight: bold; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-family: Space Grotesk;');
    console.log('%cWorld-Class Secure Payment Processing System', 'font-size: 16px; color: #d32f2f; font-family: Inter;');
</script>

<style>
    /* Premium SweetAlert2 Customization */
    .swal2-popup {
        border-radius: 20px;
        border: 2px solid var(--glass-border);
        backdrop-filter: blur(20px);
        background: var(--gradient-card);
    }

    .swal2-title {
        font-family: var(--font-display);
        color: var(--brand-primary);
        font-weight: 800;
    }

    .swal2-html-container {
        color: #333;
        font-weight: 500;
    }

    .swal2-confirm {
        background: var(--gradient-primary);
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-family: var(--font-primary);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .swal2-cancel {
        background: #666;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-family: var(--font-primary);
    }

    /* Dark mode SweetAlert2 */
    .swal2-popup[data-theme='dark'] {
        background: var(--gradient-dark);
        border-color: var(--glass-border);
    }

    .swal2-popup[data-theme='dark'] .swal2-title {
        color: white;
    }

    .swal2-popup[data-theme='dark'] .swal2-html-container {
        color: #ccc;
    }

    /* Premium Touch Support */
    @media (hover: none) {
        .verification-container:active {
            transform: scale(0.98);
        }
        
        .security-badge:active {
            transform: scale(0.95);
        }
    }
</style>
</body>
</html>
