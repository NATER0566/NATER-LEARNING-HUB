<!DOCTYPE html>
<html>
<head>
    <title>Registration Test - NATER LEARNING HUB</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #d32f2f; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #b71c1c; }
        .status { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔧 Registration System Test</h1>
        <p>This page tests if your registration form is working correctly.</p>
        
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="testName" placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="testEmail" placeholder="john@example.com">
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="testPass" placeholder="Min 8 chars, include number and special char">
        </div>
        
        <button onclick="testRegistration()">Test Registration</button>
        <button onclick="testServerConnection()" style="background: #007bff; margin-left: 10px;">Test Server Connection</button>
        
        <div id="status"></div>
        
        <hr style="margin: 30px 0;">
        <h3>📋 Debugging Information</h3>
        <div id="debugInfo"></div>
    </div>

    <script>
        // Copy the same functions from index.html
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        
        function generateCSRFToken() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
        }
        
        async function testServerConnection() {
            const status = document.getElementById('status');
            status.innerHTML = '<div class="status warning">Testing server connection...</div>';
            
            try {
                const response = await fetch('/api/health');
                if (response.ok) {
                    const data = await response.json();
                    status.innerHTML = `<div class="status success">✅ Server is running! Status: ${data.status}</div>`;
                } else {
                    status.innerHTML = '<div class="status error">❌ Server responded but with error</div>';
                }
            } catch (error) {
                status.innerHTML = `<div class="status error">❌ Cannot connect to server: ${error.message}</div>`;
            }
        }
        
        async function testRegistration() {
            const name = document.getElementById('testName').value.trim();
            const email = document.getElementById('testEmail').value.trim();
            const pass = document.getElementById('testPass').value.trim();
            const status = document.getElementById('status');
            
            // Validation
            if(!name || !email || !pass){ 
                status.innerHTML = '<div class="status error">All fields are required</div>';
                return; 
            }
            
            if(name.length < 2) {
                status.innerHTML = '<div class="status error">Name must be at least 2 characters</div>';
                return;
            }
            
            if(!emailRegex.test(email)) {
                status.innerHTML = '<div class="status error">Invalid email format</div>';
                return;
            }
            
            if(!passRegex.test(pass)) { 
                status.innerHTML = '<div class="status error">Password must be: 8+ chars, uppercase, lowercase, number, and special character (@$!%*?&)</div>';
                return; 
            }
            
            status.innerHTML = '<div class="status warning">Attempting registration...</div>';
            
            try {
                const res = await fetch('/api/register', {
                    method:'POST', 
                    headers:{
                        'Content-Type':'application/json',
                        'X-Requested-With': 'XMLHttpRequest',
                        'X-CSRF-Token': generateCSRFToken()
                    },
                    body: JSON.stringify({ 
                        name: name.trim(), 
                        email: email.toLowerCase(), 
                        pass: pass,
                        timestamp: Date.now()
                    })
                });
                
                const data = await res.json();
                
                if(data.success){ 
                    status.innerHTML = `<div class="status success">✅ Registration successful! ${data.message}</div>`;
                } else { 
                    status.innerHTML = `<div class="status error">❌ Registration failed: ${data.message || 'Unknown error'}</div>`;
                }
            } catch(err){ 
                console.error('Registration error:', err);
                status.innerHTML = `<div class="status error">❌ Connection error: ${err.message}</div>`;
            }
        }
        
        // Show debug info on load
        window.onload = function() {
            const debug = document.getElementById('debugInfo');
            debug.innerHTML = `
                <p><strong>Current URL:</strong> ${window.location.href}</p>
                <p><strong>Server endpoint:</strong> ${window.location.origin}/api/register</p>
                <p><strong>Node.js available:</strong> ${typeof require !== 'undefined' ? 'Yes' : 'No (this is browser-side test)'}</p>
                <p><strong>Fetch API available:</strong> ${typeof fetch !== 'undefined' ? 'Yes' : 'No'}</p>
                <p><strong>Crypto API available:</strong> ${typeof crypto !== 'undefined' ? 'Yes' : 'No'}</p>
            `;
        };
    </script>
</body>
</html>
