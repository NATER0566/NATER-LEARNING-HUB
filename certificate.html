<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER HUB | Certificate Redemption</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@600;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --red: #d32f2f; --gold: #d4af37; --bg: #0a0a0a; }
        
        body { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%); }

        .reflective-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(211, 47, 47, 0.08) 0%, transparent 40%); z-index: -1; pointer-events: none; animation: pulseGlow 10s ease-in-out infinite alternate; }

        #inputSection { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; flex-direction: column; }

        .top-nav { position: absolute; top: 20px; left: 20px; z-index: 100; }

        .claim-wrapper { 
            max-width: 900px; width: 100%; padding: 60px 40px; 
            background: rgba(17, 17, 17, 0.9); backdrop-filter: blur(10px); 
            border: 5px solid var(--gold); border-radius: 40px; text-align: center; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); 
        }

        .brand-nater { font-family: 'Cinzel', serif; font-weight: 900; font-size: 3rem; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; }
        .brand-hub { font-family: 'Cinzel', serif; font-weight: 900; font-size: 3rem; color: var(--red); letter-spacing: 5px; text-transform: uppercase; }

        .id-input { 
            background: #000; border: 3px solid var(--gold); color: white; padding: 20px; 
            border-radius: 15px; margin: 30px auto; width: 100%; max-width: 500px;
            text-align: center; font-weight: 900; font-size: 1.5rem; letter-spacing: 3px;
        }

        .btn-claim { padding: 18px; font-size: 1.3rem; border-radius: 15px; max-width: 500px; width: 100%; font-weight: 900; background: var(--gold); color: black; border: none; transition: 0.3s; cursor: pointer; }

        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }

        /* CERTIFICATE VIEWER */
        #certViewer { display: none; flex-direction: column; align-items: center; padding: 40px 0; width: 100%; }
        
        .cert { 
            width: 297mm; height: 210mm; background: white; border: 20px solid #d4af37; 
            box-sizing: border-box; position: relative; border-style: ridge; 
            text-align: center; color: #000; background-image: radial-gradient(circle, #ffffff 0%, #fcfcfc 100%); 
            display: flex; flex-direction: column; justify-content: space-between; padding: 40px 60px;
            overflow: hidden;
        }

        .logo-nater { font-family: 'Cinzel', serif; font-size: 42px; font-weight: 900; color: #d4af37; text-transform: uppercase; }
        .logo-hub { font-family: 'Cinzel', serif; font-size: 42px; font-weight: 900; color: #d32f2f; text-transform: uppercase; }
        
        #displayName { 
            font-size: 52px; 
            font-weight: 900; 
            border-bottom: 4px solid #d4af37; 
            padding: 5px 25px; 
            text-transform: uppercase; 
            margin: 10px auto; 
            display: inline-block;
            max-width: 95%;
            word-wrap: break-word;
            line-height: 1.2;
        }

        #displayCourse { 
            font-size: 32px; 
            color: #d4af37; 
            font-weight: 900; 
            text-transform: uppercase; 
            max-width: 90%;
            margin: 10px auto;
            word-wrap: break-word;
        }
        
        .qr-zone { text-align: left; }
        .sig-zone { text-align: right; }
        .sig-font { font-family: 'Dancing Script', cursive; font-size: 45px; font-weight: 900; }

        .id-badge { 
            font-size: 13px; 
            font-weight: 900; 
            background: #000; 
            color: #fff; 
            padding: 10px 25px; 
            border-radius: 4px; 
            border: 3px solid var(--gold);
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            body { background: white; }
            #starCanvas, .reflective-glow, #inputSection, .no-print, #loader, .top-nav { display: none !important; }
            #certViewer { display: block !important; padding: 0 !important; }
            .cert { box-shadow: none; border-width: 15px; width: 100%; height: 100vh; }
        }
    </style>
</head>
<body>

<div class="top-nav no-print">
    <button class="btn btn-outline-warning rounded-pill px-4 fw-bold" onclick="window.location.href='academy.html'">
        <i class="fas fa-arrow-left me-2"></i> BACK TO ACADEMY
    </button>
</div>

<div id="loader">
    <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;"></div>
    <h3 class="mt-3 text-warning fw-bold">AUTHENTICATING...</h3>
</div>

<canvas id="starCanvas"></canvas>
<div class="reflective-glow"></div>

<div id="inputSection" class="no-print">
    <div class="claim-wrapper">
        <div id="siteIdentity">
            <span class="brand-nater" id="siteNameNater">NATER</span> <span class="brand-hub" id="siteNameHub">HUB</span>
        </div>
        <p style="color: #d4af37; font-weight: 800; font-size: 1.1rem; letter-spacing: 2px;" id="siteTagline">OFFICIAL CERTIFICATE PORTAL</p>
        <input type="text" id="certIdInput" class="id-input" placeholder="PASTE VERIFICATION ID">
        <button class="btn btn-claim" onclick="validateId()">VERIFY & GENERATE</button>
    </div>
</div>

<div id="certViewer">
    <div class="no-print mb-4">
        <button class="btn btn-danger btn-lg fw-bold px-5 shadow" onclick="window.print()"><i class="fas fa-file-pdf me-2"></i>SAVE AS PDF</button>
        <button class="btn btn-outline-light btn-lg fw-bold px-4 ms-2" onclick="location.reload()">BACK</button>
    </div>
    <div id="scaler">
        <div class="cert" id="printableCert">
            <div>
                <span class="logo-nater" id="certNameNater">NATER</span><span class="logo-hub" id="certNameHub"> HUB</span>
                <p style="letter-spacing: 5px; font-weight: 900; text-transform: uppercase; color: #666; margin-top: 8px;">Certificate of Professional Completion</p>
            </div>
            
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <p style="font-size: 22px; font-weight: 600; margin-bottom: 10px;">This is to officially certify that</p>
                <div id="displayName">---</div>
                <p style="font-size: 22px; font-weight: 600; margin-top: 20px; margin-bottom: 10px;">has successfully mastered the premium curriculum for</p>
                <div id="displayCourse">---</div>
            </div>

            <div class="footer-row">
                <div class="qr-zone">
                    <img id="displayQR" src="" style="width: 115px; border: 2px solid #eee;">
                    <div style="font-weight: 900; border-top: 2px solid #000; margin-top: 10px; width: 170px;" id="displayDate">DATE: --</div>
                </div>

                <div class="id-badge" id="displayId">VERIFICATION ID: --</div>

                <div class="sig-zone">
                    <div class="sig-font">Nater Mbashau</div>
                    <div style="font-weight: 900; border-top: 2px solid #000; width: 210px;">Chief Instructor</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.onload = () => {
        fetchBranding();
        const urlParams = new URLSearchParams(window.location.search);
        const autoId = urlParams.get('certId'); 
        
        if(autoId) {
            document.getElementById('certIdInput').value = autoId;
            validateId();
        }
        initStars();
        animateStars();
    };

    async function fetchBranding() {
        try {
            const res = await fetch('/api/public-settings');
            const data = await res.json();
            if(data.success) {
                const nameParts = (data.siteName || 'NATER HUB').split(' ');
                const naterPart = nameParts[0];
                const hubPart = nameParts.slice(1).join(' ');

                document.getElementById('siteNameNater').innerText = naterPart;
                document.getElementById('siteNameHub').innerText = hubPart;
                document.getElementById('siteTagline').innerText = data.tagline || 'OFFICIAL CERTIFICATE PORTAL';

                document.getElementById('certNameNater').innerText = naterPart;
                document.getElementById('certNameHub').innerText = " " + hubPart;
            }
        } catch (err) { console.error("Branding fetch failed"); }
    }

    async function validateId() {
        const certId = document.getElementById('certIdInput').value.trim();
        
        if (!certId) {
            return Swal.fire('Missing ID', 'Please paste your Verification ID to proceed.', 'warning');
        }

        document.getElementById('loader').style.display = 'flex';

        try {
            const response = await fetch('/api/verify-certificate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ certId }) 
            });
            const data = await response.json();

            if (data.success) {
                document.getElementById('displayName').innerText = data.studentName;
                document.getElementById('displayCourse').innerText = data.courseTitle; 
                document.getElementById('displayId').innerText = "VERIFICATION ID: " + certId;
                
                const certDate = new Date(data.date).toLocaleDateString('en-GB', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
                document.getElementById('displayDate').innerText = "DATE: " + certDate;

                const verifyUrl = `${window.location.origin}/certificate.html?certId=${certId}`;
                document.getElementById('displayQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(verifyUrl)}&margin=10`;

                document.getElementById('inputSection').style.display = 'none';
                document.getElementById('loader').style.display = 'none';
                document.getElementById('certViewer').style.display = 'flex';
                handleScaling();
            } else {
                document.getElementById('loader').style.display = 'none';
                Swal.fire('Access Denied', data.message || 'Credential verification failed.', 'error');
            }
        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            Swal.fire('Server Error', 'Could not connect to verification server.', 'error');
        }
    }

    function handleScaling() {
        const scaler = document.getElementById('scaler');
        const winW = window.innerWidth - 40;
        if (winW < 1122) {
            scaler.style.transform = `scale(${winW / 1122})`;
            scaler.style.transformOrigin = "top center";
        }
    }

    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, o:Math.random()});
    }
    function animateStars() {
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white";
        stars.forEach(s => { ctx.globalAlpha = s.o; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y -= 0.3; if(s.y < 0) s.y = canvas.height; });
        requestAnimationFrame(animateStars);
    }
</script>
</body>
</html>
