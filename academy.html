<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER HUB | Premium Academy</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#b71c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://js.paystack.co/v1/inline.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;600;700&family=Dancing+Script:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { --red: #d32f2f; --gold: #FFD700; --bg: #0a0a0a; --brand-red: #d32f2f; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; min-height: 100vh; user-select: none; -webkit-user-select: none; }
        
        .brand-logo { margin-bottom: 20px; padding-top: 10px; text-align: center; }
        .brand-nater { font-family: 'Cinzel', serif; font-weight: 900; color: var(--gold); letter-spacing: 3px; font-size: 2.2rem; text-transform: uppercase; }
        .brand-hub { font-family: 'Cinzel', serif; font-weight: 900; color: var(--red); letter-spacing: 3px; font-size: 2.2rem; text-transform: uppercase; }
        .brand-tagline { letter-spacing: 3px; color: #aaa; font-weight: bold; font-size: 0.8rem; margin-top: -5px; text-transform: uppercase; }

        .stats-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        @media (min-width: 850px) { .stats-container { grid-template-columns: repeat(4, 1fr); } }
        
        .stat-item { text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border-bottom: 3px solid var(--gold); transition: 0.3s; }
        .stat-val { color: var(--gold); font-weight: 900; font-size: 1.5rem; display: block; }
        .stat-lbl { font-size: 0.65rem; color: #bbb; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        .search-wrapper { max-width: 500px; margin: 0 auto 15px; position: relative; padding: 0 15px; }
        .search-input { 
            background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 50px; 
            padding: 12px 25px 12px 50px; color: white; width: 100%; transition: 0.3s;
        }
        .search-input:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.1); }
        .search-icon { position: absolute; left: 35px; top: 15px; color: var(--gold); }

        .category-scroll { 
            display: flex; justify-content: flex-start; gap: 12px; overflow-x: auto; 
            padding: 10px 20px; margin-bottom: 25px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        @media (min-width: 768px) { .category-scroll { justify-content: center; } }
        
        .cat-btn { 
            background: #1a1a1a; border: 1px solid #333; color: #888; padding: 10px 24px; 
            border-radius: 50px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn.active { background: var(--gold); color: black; border-color: var(--gold); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }

        .nav-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }

        .lesson-header-branding { text-align: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .course-title-style { font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; }

        .lesson-item { background: #151515; border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--red); display: flex; flex-direction: column; transition: 0.3s; }
        .lesson-locked { opacity: 0.4; filter: grayscale(1); pointer-events: none; cursor: not-allowed; }

        .course-card { background: white; color: #333; border-radius: 20px; overflow: hidden; border-bottom: 6px solid var(--gold); transition: 0.3s; height: 100%; }
        .course-card:hover { transform: translateY(-5px); }

        .lesson-discussion-area { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; width: 100%; text-align: left; }
        .comment-list-mini { max-height: 50px; overflow: hidden; font-size: 0.85rem; margin-bottom: 10px; }
        .comment-list-mini.expanded { max-height: 250px; overflow-y: auto; }
        .comment-item { border-bottom: 1px solid #222; padding: 5px 0; }
        .comment-user { font-weight: 800; color: var(--gold); }
        .comment-text { color: #ccc; margin-left: 5px; }

        .feature-orb {
            position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #d32f2f, #800000);
            border-radius: 50%; color: white; display: none; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(211, 47, 47, 0.8), inset -5px -5px 15px rgba(0,0,0,0.4), inset 5px 5px 15px rgba(255,255,255,0.4);
            z-index: 10000; cursor: pointer; border: 3px solid #fff;
            animation: orb-pulse 2s infinite ease-in-out, orb-glow 1.5s infinite alternate;
            backdrop-filter: blur(5px);
        }
        @keyframes orb-pulse {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.15) translateY(-15px); }
        }
        @keyframes orb-glow {
            from { box-shadow: 0 0 20px var(--brand-red); }
            to { box-shadow: 0 0 50px #ffeb3b, 0 0 80px var(--brand-red); }
        }
        
        .ai-orb {
            position: fixed; bottom: 30px; left: 30px; width: 80px; height: 80px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(0, 114, 255, 0.6), inset 5px 5px 10px rgba(255,255,255,0.3);
            z-index: 10000; cursor: pointer; border: 3px solid #fff;
            animation: orb-pulse 2.5s infinite ease-in-out;
            text-decoration: none;
        }

        #videoOverlay { 
            display: none; position: fixed; inset: 0; 
            background: #ffffff; 
            z-index: 20000; flex-direction: column; align-items: center; justify-content: center; 
        }
        .video-wrapper { 
            position: relative; width: 95%; max-width: 1200px; 
            border-radius: 15px; 
            overflow: hidden; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            background: #000;
            aspect-ratio: 16 / 9;
        }
        #watermark { position: absolute; color: rgba(255,255,255,0.12); font-weight: bold; pointer-events: none; z-index: 20001; font-size: 1.1rem; transition: 6s linear; font-family: 'Cinzel', serif; text-shadow: 1px 1px 2px black; top: 10%; left: 10%; }
        
        video { width: 100%; height: 100%; display: block; object-fit: contain; }

        #paymentLoader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 30000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .spinner { width: 60px; height: 60px; border: 6px solid #222; border-top: 6px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cert-card { background: linear-gradient(135deg, #1a1a1a, #000); border: 2px solid var(--gold); border-radius: 15px; padding: 25px; text-align: center; margin-top: 30px; display: none; }
        .cert-id-box { 
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; border: 2px dashed var(--gold); 
            font-family: monospace; font-size: 1.5rem; color: var(--gold); margin-bottom: 20px; 
            cursor: pointer; position: relative; transition: 0.3s; font-weight: bold;
        }
        .cert-id-box:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return disableShortcuts(event)">

<div class="feature-orb" id="featureOrb" onclick="openAdminSuggest()">
    <i class="fas fa-gift fa-2x"></i>
</div>

<a href="nater's_ai.html" class="ai-orb">
    <i class="fas fa-robot fa-2x"></i>
</a>

<div id="paymentLoader">
    <div class="spinner"></div>
    <h4 class="fw-bold text-white mt-3">VERIFYING PAYMENT...</h4>
</div>

<div class="container p-3">
    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-outline-light btn-sm rounded-pill px-4" onclick="window.location.href='dashboard.html'"><i class="fas fa-th-large me-2"></i>DASHBOARD</button>
    </div>

    <div id="galleryView">
        <div class="brand-logo">
            <div id="siteIdentity">
                <span class="brand-nater" id="displaySiteNameNater">NATER</span><span class="brand-hub" id="displaySiteNameHub">HUB</span>
            </div>
            <div class="brand-tagline" id="displayTagline">PREMIUM ACADEMY</div>
        </div>

        <div class="stats-container">
            <div class="stat-item"><span class="stat-val" id="courseCount">0</span><span class="stat-lbl">Available Courses</span></div>
            <div class="stat-item"><span class="stat-val" id="studentCount">0</span><span class="stat-lbl">Active Students</span></div>
            <div class="stat-item"><span class="stat-val" id="scholarCount">0</span><span class="stat-lbl">Scholars</span></div>
            <div class="stat-item"><span class="stat-val" id="purchaserCount">0</span><span class="stat-lbl">Purchasers</span></div>
        </div>

        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="courseSearch" class="search-input" placeholder="Search for courses..." onkeyup="applyFilters()">
        </div>

        <div class="category-scroll" id="categoryTabs">
            <button class="cat-btn active" onclick="setCategory('All', this)">All</button>
            <button class="cat-btn" onclick="setCategory('Programming', this)">Programming</button>
            <button class="cat-btn" onclick="setCategory('Trading', this)">Trading</button>
            <button class="cat-btn" onclick="setCategory('Design', this)">Design</button>
            <button class="cat-btn" onclick="setCategory('Marketing', this)">Marketing</button>
        </div>

        <div class="nav-container">
            <button class="btn btn-warning rounded-pill px-4 fw-bold shadow" onclick="resetView()">EXPLORE ALL</button>
            <button class="btn btn-outline-warning rounded-pill px-4 fw-bold shadow" onclick="filterPurchased()">MY DASHBOARD</button>
            <a href="verify-payment.html" class="btn btn-outline-danger rounded-pill px-4 fw-bold shadow"><i class="fas fa-receipt me-2"></i>VERIFY PAYMENT</a>
            <a href="verify-certificate.html" class="btn btn-outline-light rounded-pill px-4 fw-bold shadow"><i class="fas fa-certificate me-2"></i>VERIFY CERTIFICATE</a>
        </div>

        <div id="courseGrid" class="row g-4 text-start"></div>
    </div>

    <div id="lessonView" style="display:none;">
        <div class="mb-4 text-warning fw-bold" style="cursor:pointer;" onclick="location.reload()"><i class="fas fa-arrow-left me-2"></i> BACK TO HUB</div>
        <div class="lesson-header-branding">
            <span class="brand-nater course-title-style" id="activeTitleNater"></span><span class="brand-hub course-title-style" id="activeTitleHub"></span>
        </div>
        <div id="lessonList"></div>

        <div class="cert-card" id="completionCard">
            <h3 class="text-gold fw-bold mb-2"><i class="fas fa-award me-2"></i> COURSE COMPLETED!</h3>
            <p class="text-white small mb-3">Your unique verification ID is below. Click to copy.</p>
            <div class="cert-id-box" id="certIdDisplay" onclick="copyCertID()">---</div>
            <p class="text-warning xsmall mb-4"><i class="fas fa-mobile-alt me-1"></i> Desktop mode recommended for printing.</p>
            <button class="btn btn-warning fw-bold px-5" onclick="goToCertificate()">GENERATE & PRINT CERTIFICATE</button>
        </div>
    </div>
</div>

<div id="videoOverlay">
    <div class="brand-logo mb-3">
        <span class="brand-nater" id="playerSiteNater" style="color:black; font-size:1.5rem;">NATER</span><span class="brand-hub" id="playerSiteHub" style="font-size:1.5rem;">HUB</span>
    </div>
    <div class="video-wrapper">
        <div id="watermark">SECURE SESSION: <span id="wmEmail"></span></div>
        <video id="player" controls controlsList="nodownload" oncontextmenu="return false;"></video>
    </div>
    <button class="btn btn-danger mt-4 mb-4 fw-bold px-5" onclick="closeVideo()">EXIT SECURE PLAYER</button>
</div>

<script>
    function payWithPaystackRedirect(id, title, price) {
        window.location.href = `/api/paystack/initialize?courseId=${id}&title=${encodeURIComponent(title)}&amount=${price}&email=${student.email}`;
    }

    const token = localStorage.getItem('token');
    if (!token) window.location.replace('index.html');

    function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch (e) { return null; } }
    const student = parseJwt(token);
    document.getElementById('wmEmail').innerText = student ? student.email : '';

    let allCourses = [], currentCategory = 'All', ownedCourseIds = [], showingPurchasedOnly = false;
    let activeLessons = [], currentCourseId = null, currentLessonId = null, currentLessonIndex = null;
    let enrollmentData = null; 

    function disableShortcuts(e) {
        if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u'))) return false;
    }

    // ASAP LOGIC: Self-invoking function starts fetches immediately and registers SW
    (async function immediateSync() {
        await init();

        // PWA Service Worker Registration
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js")
                    .then(reg => console.log("Academy PWA Ready"))
                    .catch(err => console.error("SW failed", err));
            });
        }
    })();

    async function init() {
        try {
            // Parallel loading of settings and courses for maximum speed
            const [settingsRes, courseRes] = await Promise.all([
                fetch('/api/public-settings'),
                fetch('/api/academy/all-courses', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: student.email })
                })
            ]);

            const sData = await settingsRes.json();
            if(sData.success) {
                const nameParts = (sData.siteName || 'NATER HUB').split(' ');
                document.getElementById('displaySiteNameNater').innerText = nameParts[0] || '';
                document.getElementById('displaySiteNameHub').innerText = nameParts.slice(1).join(' ') || '';
                document.getElementById('playerSiteNater').innerText = nameParts[0] || '';
                document.getElementById('playerSiteHub').innerText = nameParts.slice(1).join(' ') || '';
                document.getElementById('displayTagline').innerText = sData.tagline || 'PREMIUM ACADEMY';
                
                if(sData.orbData) {
                    const orb = typeof sData.orbData === 'string' ? JSON.parse(sData.orbData) : sData.orbData;
                    const orbEl = document.getElementById('featureOrb');
                    orbEl.style.display = (orb.active === true || orb.active === "true") ? 'flex' : 'none';
                    orbEl.dataset.info = JSON.stringify(orb);
                }
            }

            const cData = await courseRes.json();
            if(cData.success) {
                allCourses = cData.courses || [];
                ownedCourseIds = cData.ownedIds || [];
                document.getElementById('courseCount').innerText = cData.courseCount || 0;
                document.getElementById('studentCount').innerText = cData.registeredCount || 0;
                document.getElementById('scholarCount').innerText = cData.scholarCount || 0;
                document.getElementById('purchaserCount').innerText = cData.purchaserCount || 0;
                applyFilters();
            }
        } catch (err) { console.error("Init failed", err); }
    }

    function setCategory(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters(); 
    }

    function filterPurchased() { showingPurchasedOnly = true; applyFilters(); }
    function resetView() { showingPurchasedOnly = false; applyFilters(); }

    function applyFilters() {
        const query = document.getElementById('courseSearch').value.toLowerCase();
        const filtered = allCourses.filter(c => {
            const matchesSearch = c.title.toLowerCase().includes(query);
            const matchesCat = currentCategory === 'All' || c.category === currentCategory;
            const isOwned = ownedCourseIds.includes(c.id) || student.is_admin;
            const matchesPurchased = !showingPurchasedOnly || isOwned;
            return matchesSearch && matchesCat && matchesPurchased;
        });
        renderGrid(filtered);
    }

    function renderGrid(courses) {
        const grid = document.getElementById('courseGrid');
        if (courses.length === 0) {
            grid.innerHTML = `<div class="col-12 text-center py-5"><h5 class="text-muted">No courses found.</h5></div>`;
            return;
        }
        grid.innerHTML = courses.map(c => {
            const isOwned = ownedCourseIds.includes(c.id) || student.is_admin;
            return `
            <div class="col-lg-4 col-md-6 mb-3">
                <div class="course-card">
                    <img src="${c.thumbnail}" style="height:180px; width:100%; object-fit:cover;">
                    <div class="p-3">
                        <h6 class="fw-bold mb-3" style="color:#333;">${c.title}</h6>
                        <button class="btn ${isOwned ? 'btn-success' : 'btn-dark'} w-100 btn-sm fw-bold" 
                            onclick="event.stopPropagation(); ${isOwned 
                                ? `handleAccess('${c.id}', '${c.title.replace(/'/g, "\\'")}', ${c.price}, true)` 
                                : `payWithPaystackRedirect('${c.id}', '${c.title.replace(/'/g, "\\'")}', ${c.price})`}">
                            ${isOwned ? '<i class="fas fa-play me-2"></i>RESUME' : 'ENROLL ₦' + Number(c.price).toLocaleString()}
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function handleAccess(id, title, price, owned) {
        if(owned) return openCourse(id, title);
        if (typeof PaystackPop === "undefined") {
            Swal.fire({ icon: "error", title: "System not ready", text: "Please refresh the page." });
            return;
        }

        const handler = PaystackPop.setup({
            key: 'pk_live_e4550ea9879afc005733e9f2be957500e1999d8c',
            email: student.email,
            amount: price * 100,
            currency: 'NGN',
            callback: async (response) => {
                document.getElementById('paymentLoader').style.display = 'flex';
                const res = await fetch('/api/academy/purchase', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: student.email, courseId: id, reference: response.reference, courseTitle: title })
                });
                const result = await res.json();
                document.getElementById('paymentLoader').style.display = 'none';
                if(result.success) {
                    Swal.fire('Success!', 'Course unlocked!', 'success').then(() => location.reload());
                }
            }
        });
        handler.openIframe();
    }

    async function openCourse(id, title) {
        currentCourseId = id;
        const res = await fetch('/api/academy/lessons', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: student.email, courseId: id })
        });
        const data = await res.json();
        
        activeLessons = data.lessons || [];
        enrollmentData = data.enrollment || null; 
        
        document.getElementById('galleryView').style.display = 'none';
        document.getElementById('lessonView').style.display = 'block';
        
        const nameParts = title.split(' ');
        document.getElementById('activeTitleNater').innerText = nameParts[0] + " ";
        document.getElementById('activeTitleHub').innerText = nameParts.slice(1).join(' ');

        renderLessons();
    }

    function renderLessons() {
        const list = document.getElementById('lessonList');
        let allWatched = true;

        list.innerHTML = activeLessons.map((l, i) => {
            const isUnlocked = i === 0 || activeLessons[i-1].watched === true || activeLessons[i-1].watched === 1;
            if(!l.watched) allWatched = false;

            return `
            <div class="lesson-item ${!isUnlocked ? 'lesson-locked' : ''}">
                <div class="d-flex justify-content-between align-items-center w-100">
                    <div>
                        <div class="fw-bold"><i class="fas ${l.watched ? 'fa-check-circle text-success' : 'fa-play-circle'} me-2"></i>${i+1}. ${l.title}</div>
                        ${l.pdf ? `<a href="${l.pdf}" target="_blank" class="text-info xsmall mt-1 d-block"><i class="fas fa-file-pdf me-1"></i>Resource Material</a>` : ''}
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="${isUnlocked ? `playVideo('${l.video}', '${l.id}', ${i})` : 'void(0)'}">WATCH</button>
                </div>
                <div class="lesson-discussion-area">
                    <div id="comments-${l.id}" class="comment-list-mini" onclick="toggleComments('${l.id}')">Loading comments...</div>
                    <div class="input-group input-group-sm">
                        <input type="text" id="input-${l.id}" class="form-control bg-dark text-white border-secondary" placeholder="Ask a question...">
                        <button class="btn btn-warning fw-bold" onclick="postComment('${l.id}')">SEND</button>
                    </div>
                </div>
            </div>`;
        }).join('');

        activeLessons.forEach(l => loadComments(l.id));

        if(allWatched && activeLessons.length > 0) {
            document.getElementById('completionCard').style.display = 'block';
            document.getElementById('certIdDisplay').innerText = enrollmentData.payment_reference;
        }
    }

    function toggleComments(id) {
        document.getElementById(`comments-${id}`).classList.toggle('expanded');
    }

    async function loadComments(lessonId) {
        const res = await fetch('/api/academy/get-comments', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ lessonId }) });
        const data = await res.json();
        const container = document.getElementById(`comments-${lessonId}`);
        if(data.comments?.length > 0) {
            const last = data.comments[data.comments.length - 1];
            container.innerHTML = `<div class="comment-item"><span class="comment-user">${last.user_name}:</span><span class="comment-text">${last.comment}</span></div>`;
            if(data.comments.length > 1) container.innerHTML += `<div class="text-center mt-1"><small style="color:var(--gold); cursor:pointer">View all ${data.comments.length} messages</small></div>`;
            
            container.onclick = () => {
                container.classList.toggle('expanded');
                if(container.classList.contains('expanded')) {
                    container.innerHTML = data.comments.map(c => `<div class="comment-item"><span class="comment-user">${c.user_name}:</span><span class="comment-text">${c.comment}</span></div>`).join('');
                } else {
                    loadComments(lessonId);
                }
            };
        } else {
            container.innerHTML = '<span class="text-muted small">No questions yet.</span>';
        }
    }

    async function postComment(lessonId) {
        const input = document.getElementById(`input-${lessonId}`);
        const text = input.value.trim();
        if(!text) return;
        input.value = ''; 
        await fetch('/api/academy/post-comment', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ lessonId: lessonId, email: student.email, name: student.name, comment: text })
        });
        loadComments(lessonId);
    }

    function playVideo(url, lessonId, index) {
        currentLessonId = lessonId;
        currentLessonIndex = index;
        const p = document.getElementById('player');
        p.src = url;
        document.getElementById('videoOverlay').style.display = 'flex';
        p.play();

        p.onended = async () => {
            activeLessons[index].watched = true;
            renderLessons();
            await fetch('/api/academy/mark-watched', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: student.email, lessonId: lessonId })
            });

            if(index + 1 < activeLessons.length) {
                const next = activeLessons[index + 1];
                Swal.fire({
                    title: 'Next Lesson?',
                    text: `Starting: ${next.title}`,
                    timer: 3000,
                    showConfirmButton: true,
                    confirmButtonText: 'Play Now',
                    timerProgressBar: true
                }).then((res) => {
                    if(res.isConfirmed || res.dismiss === Swal.DismissReason.timer) {
                        playVideo(next.video, next.id, index + 1);
                    }
                });
            }
        };
    }

    function closeVideo() { document.getElementById('player').pause(); document.getElementById('videoOverlay').style.display = 'none'; }

    function copyCertID() {
        const text = document.getElementById('certIdDisplay').innerText;
        navigator.clipboard.writeText(text).then(() => {
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'ID Copied!', showConfirmButton: false, timer: 1500 });
        });
    }

    function goToCertificate() {
        const certID = document.getElementById('certIdDisplay').innerText;
        if(!certID || certID === "---") return Swal.fire("Wait", "Finish the lessons!", "info");
        window.location.href = `certificate.html?course=${currentCourseId}&certId=${certID}&u=${student.email}`;
    }

    function openAdminSuggest() {
        const orbData = JSON.parse(document.getElementById('featureOrb').dataset.info);
        Swal.fire({
            title: orbData.title,
            text: orbData.message,
            icon: 'info',
            confirmButtonText: orbData.url ? 'Explore Now' : 'Got it',
            showCancelButton: true,
            confirmButtonColor: '#d32f2f'
        }).then((res) => { if(res.isConfirmed && orbData.url) window.location.href = orbData.url; });
    }

    setInterval(() => {
        const wm = document.getElementById('watermark');
        if(wm) {
            wm.style.top = Math.random() * 80 + '%';
            wm.style.left = Math.random() * 80 + '%';
        }
    }, 6000);
</script>
</body>
</html>
