<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | NATER HUB ACADEMY</title>
    
    <meta name="theme-color" content="#b71c1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --brand-red: #d32f2f; 
            --brand-dark: #b71c1c; 
            --owner-gold: #FFD700;
            --bg-color: #0f0f0f; 
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; 
            padding: 40px 0;
        }

        .reset-card {
            background: white;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 95%;
            overflow: hidden;
            border: 1px solid #eee;
            animation: fadeIn 0.8s ease-out;
        }

        .brand-header {
            background: var(--brand-dark);
            padding: 30px;
            border-bottom: 6px solid var(--owner-gold);
        }

        .brand-header h1 {
            color: white;
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-display {
            background: white;
            padding: 25px 0 10px 0;
        }

        .logo-display img {
            width: 250px;
            height: auto;
            display: inline-block;
        }

        .content-body {
            padding: 30px 45px;
            text-align: center;
        }

        h2 {
            color: var(--brand-dark);
            font-weight: 800;
            margin-bottom: 15px;
            font-size: 24px;
        }

        p {
            color: #333;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .form-container { text-align: left; }
        label { font-weight: 800; color: #444; margin-bottom: 8px; display: block; text-transform: uppercase; font-size: 12px; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            padding-right: 50px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            transition: 0.3s;
            background: #fdfdfd;
        }

        input:focus { border-color: var(--brand-red); outline: none; background: #fff; box-shadow: 0 0 10px rgba(183, 28, 28, 0.1); }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            transition: 0.3s;
            z-index: 10;
        }

        .toggle-password:hover { color: var(--brand-dark); }

        .btn-reset {
            background: var(--brand-dark);
            color: white !important;
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-reset:hover { 
            background: #000;
            transform: translateY(-2px);
        }

        .footer-branding {
            background: #1a1a1a;
            padding: 30px;
            text-align: center;
            color: #aaa;
            font-size: 11px;
        }

        .footer-branding p {
            color: var(--owner-gold);
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 11px;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="brand-header">
            <h1 id="siteNameTitle">NATER HUB ACADEMY</h1>
        </div>

        <div class="logo-display">
            <img src="/logo.jpg" alt="Nater Academy">
        </div>

        <div class="content-body">
            <h2>Reset Your Password</h2>
            <p>Please define your new academy access credentials below to regain entry to your portal.</p>

            <form id="resetForm" class="form-container">
                <label>New Password</label>
                <div class="input-group">
                    <input type="password" id="newPass" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('newPass', this)"></i>
                </div>
                
                <label>Confirm Password</label>
                <div class="input-group">
                    <input type="password" id="confirmPass" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('confirmPass', this)"></i>
                </div>
                
                <button type="submit" id="resetBtn" class="btn-reset">Update Password</button>
            </form>
        </div>

        <div class="footer-branding">
            <p>SECURE GLOBAL PRODUCTION PORTAL</p>
            &copy; <span id="year"></span> NATER HUB ACADEMY. All Rights Reserved.
        </div>
    </div>

    <script>
        // --- ASAP LOGIC: Instant Data Sync without PWA ---
        (async function immediateSync() {
            // Immediate Branding Fetch
            try {
                const res = await fetch('/api/public-settings');
                const data = await res.json();
                if(data.success && data.siteName) {
                    document.getElementById('siteNameTitle').innerText = data.siteName;
                }
            } catch(e) { console.log("Branding sync skipped."); }
        })();

        document.getElementById('year').textContent = new Date().getFullYear();
        
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resetBtn = document.getElementById('resetBtn');
            const pass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;

            if (pass !== confirm) {
                return Swal.fire({ icon: 'warning', title: 'Sync Error', text: 'Passwords do not match.', confirmButtonColor: '#b71c1c' });
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                const res = await fetch('/api/complete-reset', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, pass })
                });
                const data = await res.json();
                
                if (data.success) {
                    Swal.fire({ icon: 'success', title: 'Success', text: 'Password updated! Redirecting...', showConfirmButton: false, timer: 2000 })
                    .then(() => window.location.href = "/index.html");
                } else {
                    resetBtn.disabled = false;
                    resetBtn.innerHTML = 'Update Password';
                    Swal.fire({ icon: 'error', title: 'Denied', text: data.message, confirmButtonColor: '#b71c1c' });
                }
            } catch (err) {
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Update Password';
                Swal.fire('Error', 'Server connection failed.', 'error');
            }
        });
    </script>
</body>
</html>
