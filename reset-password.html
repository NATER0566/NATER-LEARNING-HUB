<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER LEARNING HUB | Reset Password</title>
    
    <!-- Enhanced Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://api.naterhub.com;">
    
    <meta name="theme-color" content="#d32f2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NATER HUB">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --brand-primary: #d32f2f; 
            --brand-dark: #b71c1c; 
            --brand-darker: #8b0000;
            --brand-light: #ffcdd2;
            --accent-gold: #FFD700;
            --accent-platinum: #e5e4e2;
            
            --gradient-primary: linear-gradient(135deg, #d32f2f 0%, #b71c1c 50%, #8b0000 100%);
            --gradient-gold: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            --gradient-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-xl: 0 16px 40px rgba(0,0,0,0.16);
            --shadow-premium: 0 20px 60px rgba(211, 47, 47, 0.15);
            --shadow-gold: 0 20px 60px rgba(255, 215, 0, 0.2);
            
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-brand: 'Cinzel', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; 
            justify-content: center;
            align-items: center; 
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(211, 47, 47, 0.1) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
        }

        /* Premium Reset Container */
        .reset-container {
            max-width: 700px;
            width: 100%;
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border: 5px solid var(--accent-gold);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 
                var(--shadow-gold),
                0 0 120px rgba(255, 215, 0, 0.3);
            position: relative;
        }

        /* Premium Brand Header */
        .brand-header {
            background: var(--gradient-primary);
            padding: 40px 30px;
            text-align: center;
            border-bottom: 6px solid var(--accent-gold);
            position: relative;
            overflow: hidden;
        }

        .brand-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-title {
            font-family: var(--font-brand);
            font-weight: 900;
            font-size: 2.2rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 5px;
            position: relative;
            z-index: 1;
            animation: brandGlow 3s ease-in-out infinite alternate;
        }

        @keyframes brandGlow {
            from { filter: brightness(1) drop-shadow(0 0 15px rgba(255, 215, 0, 0.4)); }
            to { filter: brightness(1.3) drop-shadow(0 0 30px rgba(255, 215, 0, 0.6)); }
        }

        /* Premium Logo Section */
        .logo-section {
            background: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .logo-img {
            width: 280px;
            height: auto;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* Premium Content Section */
        .content-section {
            padding: 50px 40px;
            text-align: center;
            position: relative;
        }

        .reset-icon {
            width: 100px;
            height: 100px;
            background: var(--gradient-glass);
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: var(--shadow-md);
            animation: iconPulse 3s infinite alternate ease-in-out;
        }

        @keyframes iconPulse {
            from { 
                transform: scale(1); 
                box-shadow: var(--shadow-md);
            }
            to { 
                transform: scale(1.1); 
                box-shadow: var(--shadow-gold);
            }
        }

        .reset-icon-inner {
            font-size: 3rem;
            color: var(--accent-gold);
            animation: keyRotate 4s linear infinite;
        }

        @keyframes keyRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .reset-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 900;
            color: var(--brand-primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .reset-description {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Premium Form */
        .form-container {
            text-align: left;
            max-width: 450px;
            margin: 0 auto;
        }

        .form-label {
            font-weight: 800;
            color: var(--brand-primary);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .form-input {
            width: 100%;
            padding: 18px 50px 18px 20px;
            border: 3px solid var(--glass-border);
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--glass-bg);
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-sm);
        }

        .form-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .form-input:focus {
            border-color: var(--accent-gold);
            outline: none;
            background: rgba(255,255,255,0.15);
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.3),
                var(--shadow-md);
            transform: translateY(-2px);
        }

        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--accent-gold);
            transition: all 0.3s;
            z-index: 10;
            font-size: 1.2rem;
        }

        .password-toggle:hover {
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        /* Password Strength Indicator */
        .strength-indicator {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s;
            background: #ddd;
        }

        .strength-weak { background: #f44336; }
        .strength-medium { background: #FF9800; }
        .strength-strong { background: #4CAF50; }

        /* Premium Button */
        .reset-button {
            background: var(--gradient-gold);
            color: #000;
            font-weight: 900;
            padding: 20px;
            border-radius: 16px;
            border: none;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-gold);
            position: relative;
            overflow: hidden;
            font-family: var(--font-display);
        }

        .reset-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .reset-button:hover::before {
            left: 100%;
        }

        .reset-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 80px rgba(255, 215, 0, 0.5);
        }

        .reset-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Premium Footer */
        .footer-section {
            background: var(--gradient-dark);
            padding: 30px;
            text-align: center;
            border-top: 3px solid var(--accent-gold);
        }

        .footer-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--gradient-glass);
            border: 2px solid var(--accent-gold);
            border-radius: 50px;
            padding: 12px 24px;
            margin-bottom: 15px;
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer-text {
            color: #ccc;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .footer-copyright {
            color: var(--accent-gold);
            font-weight: 700;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .reset-container {
                margin: 20px;
            }

            .brand-title {
                font-size: 1.8rem;
            }

            .reset-title {
                font-size: 1.6rem;
            }

            .form-container {
                max-width: 100%;
            }

            .content-section {
                padding: 30px 25px;
            }
        }

        /* Premium Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 1s ease-out;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body data-theme="dark" oncontextmenu="return false;" onkeydown="return disableShortcuts(event)">

<!-- Premium Reset Container -->
<div class="reset-container fade-in-up">
    <!-- Premium Brand Header -->
    <div class="brand-header">
        <h1 class="brand-title" id="siteNameTitle">NATER LEARNING HUB</h1>
    </div>

    <!-- Premium Logo Section -->
    <div class="logo-section">
        <img src="logo.jpg" alt="NATER Learning Hub" class="logo-img" id="logoImage">
    </div>

    <!-- Premium Content Section -->
    <div class="content-section">
        <!-- Reset Icon -->
        <div class="reset-icon">
            <i class="fa-solid fa-key reset-icon-inner"></i>
        </div>

        <!-- Reset Title -->
        <h2 class="reset-title">Reset Your Password</h2>
        
        <!-- Reset Description -->
        <p class="reset-description">
            Please define your new academy access credentials below to regain secure entry to your premium learning portal.
        </p>

        <!-- Premium Form -->
        <form id="resetForm" class="form-container">
            <label class="form-label" for="newPass">New Password</label>
            <div class="input-group">
                <input type="password" id="newPass" class="form-input" placeholder="Enter your new password" required>
                <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('newPass', this)"></i>
                <div class="strength-indicator" id="strengthIndicator"></div>
            </div>
            
            <label class="form-label" for="confirmPass">Confirm Password</label>
            <div class="input-group">
                <input type="password" id="confirmPass" class="form-input" placeholder="Confirm your new password" required>
                <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('confirmPass', this)"></i>
            </div>
            
            <button type="submit" id="resetBtn" class="reset-button">
                <i class="fa-solid fa-shield-halved me-2"></i>
                Update Password
            </button>
        </form>
    </div>

    <!-- Premium Footer -->
    <div class="footer-section">
        <div class="footer-badge">
            <i class="fa-solid fa-lock"></i>
            <span>SECURE GLOBAL PORTAL</span>
        </div>
        <div class="footer-text">
            © <span id="year"></span> <span id="footerSiteName">NATER LEARNING HUB</span>. All Rights Reserved.
        </div>
        <div class="footer-copyright">
            PREMIUM EDUCATION PLATFORM
        </div>
    </div>
</div>

<script>
    // Enhanced Security
    function disableShortcuts(e) { 
        if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u'))) {
            e.preventDefault();
            return false;
        }
    }

    // Premium Toast Notification
    const showToast = (icon, title, text = '') => {
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });
        Toast.fire({ 
            icon: icon, 
            title: title,
            text: text
        });
    };

    // Password Strength Checker
    function checkPasswordStrength(password) {
        let strength = 0;
        
        if (password.length >= 8) strength++;
        if (password.length >= 12) strength++;
        if (/[a-z]/.test(password)) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;
        
        return strength;
    }

    // Update Password Strength Indicator
    function updatePasswordStrength(password) {
        const indicator = document.getElementById('strengthIndicator');
        const strength = checkPasswordStrength(password);
        
        indicator.className = 'strength-indicator';
        if (strength <= 2) {
            indicator.classList.add('strength-weak');
        } else if (strength <= 4) {
            indicator.classList.add('strength-medium');
        } else {
            indicator.classList.add('strength-strong');
        }
    }

    // Toggle Password Visibility
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    // Premium Initialization
    window.onload = async () => {
        // Set current year
        document.getElementById('year').textContent = new Date().getFullYear();
        
        // Fetch custom branding
        try {
            const res = await fetch('/api/public-settings');
            const data = await res.json();
            
            if(data.success && data.siteName) {
                const siteName = data.siteName;
                document.getElementById('siteNameTitle').innerText = siteName;
                document.getElementById('footerSiteName').innerText = siteName;
                
                // Update page title
                document.title = `${siteName} | Reset Password`;
            }
            
            // Update logo if available
            if(data.logo) {
                document.getElementById('logoImage').src = data.logo;
            }
        } catch(e) { 
            console.log("Branding sync skipped - using defaults"); 
        }
    };

    // Password Input Event Listener
    document.getElementById('newPass').addEventListener('input', (e) => {
        updatePasswordStrength(e.target.value);
    });

    // Form Submission
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const resetBtn = document.getElementById('resetBtn');
        const newPass = document.getElementById('newPass').value;
        const confirmPass = document.getElementById('confirmPass').value;

        // Validation
        if (newPass.length < 8) {
            return Swal.fire({
                icon: 'warning',
                title: 'Password Too Short',
                text: 'Password must be at least 8 characters long.',
                confirmButtonColor: '#d32f2f'
            });
        }

        if (newPass !== confirmPass) {
            return Swal.fire({
                icon: 'warning',
                title: 'Password Mismatch',
                text: 'Passwords do not match. Please try again.',
                confirmButtonColor: '#d32f2f'
            });
        }

        const strength = checkPasswordStrength(newPass);
        if (strength <= 2) {
            return Swal.fire({
                icon: 'warning',
                title: 'Weak Password',
                text: 'Please choose a stronger password with mixed characters, numbers, and symbols.',
                confirmButtonColor: '#d32f2f'
            });
        }

        // Disable button and show loading
        resetBtn.disabled = true;
        resetBtn.innerHTML = '<i class="fa-solid fa-spinner spinner me-2"></i>Updating Password...';

        try {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            const response = await fetch('/api/complete-reset', { 
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token') || ''}`
                },
                body: JSON.stringify({ 
                    email: email,
                    pass: newPass 
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast('success', 'Password Updated!', 'Your password has been successfully reset.');
                
                Swal.fire({
                    icon: 'success',
                    title: '🎉 Password Reset Successful!',
                    text: 'Your password has been updated. Redirecting to login...',
                    background: '#1a1a1a',
                    color: '#fff',
                    confirmButtonColor: '#FFD700',
                    confirmButtonText: 'Continue to Login',
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = "/index.html";
                });
            } else {
                throw new Error(data.message || "Password reset failed");
            }
        } catch (err) {
            resetBtn.disabled = false;
            resetBtn.innerHTML = '<i class="fa-solid fa-shield-halved me-2"></i>Update Password';
            
            Swal.fire({
                icon: 'error',
                title: 'Reset Failed',
                text: err.message || 'Server connection failed. Please try again.',
                confirmButtonColor: '#d32f2f'
            });
        }
    });

    // Premium Security Enhancements
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
            e.preventDefault();
            return false;
        }
    });

    // Premium Performance Monitoring
    console.log('%c🔑 NATER LEARNING HUB - Premium Password Reset 🔑', 'font-size: 28px; font-weight: bold; color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-family: Space Grotesk;');
    console.log('%cWorld-Class Security System', 'font-size: 16px; color: #d32f2f; font-family: Inter;');
</script>

<style>
    /* Premium SweetAlert2 Customization */
    .swal2-popup {
        border-radius: 20px;
        border: 2px solid var(--glass-border);
        backdrop-filter: blur(20px);
        background: var(--gradient-card);
    }

    .swal2-title {
        font-family: var(--font-display);
        color: var(--brand-primary);
        font-weight: 800;
    }

    .swal2-html-container {
        color: #333;
        font-weight: 500;
    }

    .swal2-confirm {
        background: var(--gradient-primary);
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-family: var(--font-primary);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Premium Touch Support */
    @media (hover: none) {
        .reset-button:active {
            transform: scale(0.98);
        }
        
        .logo-img:active {
            transform: scale(0.95);
        }
        
        .password-toggle:active {
            transform: scale(0.9);
        }
    }
</style>
</body>
</html>
