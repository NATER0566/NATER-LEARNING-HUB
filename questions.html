<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATER LEARNING HUB | Student Questions</title>
    
    <!-- Enhanced Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://api.naterhub.com;">
    
    <meta name="theme-color" content="#d32f2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NATER HUB">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root { 
            --brand-primary: #d32f2f; 
            --brand-dark: #b71c1c; 
            --brand-darker: #8b0000;
            --brand-light: #ffcdd2;
            --accent-gold: #FFD700;
            --accent-platinum: #e5e4e2;
            
            --gradient-primary: linear-gradient(135deg, #d32f2f 0%, #b71c1c 50%, #8b0000 100%);
            --gradient-gold: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            --gradient-card: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            --gradient-dark: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-xl: 0 16px 40px rgba(0,0,0,0.16);
            --shadow-premium: 0 20px 60px rgba(211, 47, 47, 0.15);
            
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-brand: 'Cinzel', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 50%, #d32f2f 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(211, 47, 47, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%);
            pointer-events: none; z-index: -1;
        }

        /* Header */
        .header {
            background: var(--gradient-primary);
            color: white;
            padding: 20px 0;
            box-shadow: var(--shadow-lg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            font-family: var(--font-brand);
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* Main Container */
        .questions-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Question Form */
        .question-form-card {
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border: 3px solid var(--accent-gold);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: var(--shadow-premium);
        }

        .form-label {
            font-weight: 600;
            color: var(--brand-primary);
            margin-bottom: 10px;
            display: block;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent-gold);
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .btn-submit {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        /* Questions List */
        .questions-list {
            display: grid;
            gap: 20px;
        }

        .question-card {
            background: var(--gradient-card);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow-md);
            border-left: 5px solid var(--accent-gold);
            transition: transform 0.3s ease;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-category {
            background: var(--gradient-gold);
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .question-date {
            color: #666;
            font-size: 0.9rem;
        }

        .question-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--brand-primary);
            margin-bottom: 10px;
        }

        .question-content {
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .student-name {
            font-weight: 600;
            color: var(--brand-primary);
        }

        .admin-reply {
            background: #f8f9fa;
            border-left: 3px solid var(--brand-primary);
            padding: 15px;
            margin-top: 15px;
            border-radius: 5px;
        }

        .admin-reply-label {
            font-weight: 600;
            color: var(--brand-primary);
            margin-bottom: 5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .questions-container {
                padding: 0 15px;
            }
            
            .question-form-card {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h1><i class="fa-solid fa-graduation-cap me-3"></i>Student Questions</h1>
                <nav>
                    <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">
                        <i class="fa-solid fa-dashboard me-1"></i>Dashboard
                    </a>
                    <a href="index.html" class="btn btn-outline-light btn-sm">
                        <i class="fa-solid fa-home me-1"></i>Home
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="questions-container">
        <!-- Submit Question Form -->
        <div class="question-form-card">
            <h2 class="text-center mb-4">
                <i class="fa-solid fa-question-circle me-2" style="color: var(--accent-gold);"></i>
                Ask a Question
            </h2>
            <form id="questionForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="studentName">Your Name</label>
                        <input type="text" id="studentName" class="form-control" placeholder="Enter your name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="studentEmail">Your Email</label>
                        <input type="email" id="studentEmail" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="questionCategory">Category</label>
                        <select id="questionCategory" class="form-select" required>
                            <option value="">Select a category</option>
                            <option value="General">General</option>
                            <option value="Technical">Technical Support</option>
                            <option value="Course">Course Related</option>
                            <option value="Payment">Payment & Billing</option>
                            <option value="Account">Account Issues</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" for="questionCourse">Related Course (Optional)</label>
                        <input type="text" id="questionCourse" class="form-control" placeholder="Course name or code">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label" for="questionTitle">Question Title</label>
                    <input type="text" id="questionTitle" class="form-control" placeholder="Brief summary of your question" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label" for="questionContent">Detailed Question</label>
                    <textarea id="questionContent" class="form-control" rows="6" placeholder="Provide all relevant details about your question..." required></textarea>
                </div>
                
                <div class="text-center">
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-paper-plane me-2"></i>
                        Submit Question
                    </button>
                </div>
            </form>
        </div>

        <!-- Questions List -->
        <div class="questions-list" id="questionsList">
            <!-- Questions will be loaded here -->
        </div>
    </div>

    <script>
        // Load questions when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadQuestions();
        });

        // Submit question
        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('studentName').value,
                email: document.getElementById('studentEmail').value,
                category: document.getElementById('questionCategory').value,
                course: document.getElementById('questionCourse').value,
                title: document.getElementById('questionTitle').value,
                content: document.getElementById('questionContent').value
            };
            
            try {
                const response = await fetch('/api/student/submit-question', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Question Submitted!',
                        text: 'Your question has been submitted successfully. We will respond soon.',
                        confirmButtonColor: '#d32f2f'
                    });
                    
                    // Clear form
                    document.getElementById('questionForm').reset();
                    
                    // Reload questions
                    loadQuestions();
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Submission Failed',
                        text: result.message || 'Failed to submit question. Please try again.',
                        confirmButtonColor: '#d32f2f'
                    });
                }
            } catch (error) {
                console.error('Error submitting question:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: 'Failed to submit question. Please check your connection and try again.',
                    confirmButtonColor: '#d32f2f'
                });
            }
        });

        // Load existing questions
        async function loadQuestions() {
            try {
                const response = await fetch('/api/student/questions');
                const result = await response.json();
                
                const questionsList = document.getElementById('questionsList');
                questionsList.innerHTML = '';
                
                if (result.success && result.questions && result.questions.length > 0) {
                    result.questions.forEach(question => {
                        const questionCard = createQuestionCard(question);
                        questionsList.appendChild(questionCard);
                    });
                } else {
                    questionsList.innerHTML = `
                        <div class="text-center py-5">
                            <i class="fa-solid fa-comments fa-3x mb-3" style="color: #ccc;"></i>
                            <h3>No Questions Yet</h3>
                            <p class="text-muted">Be the first to ask a question!</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('questionsList').innerHTML = `
                    <div class="text-center py-5">
                        <i class="fa-solid fa-exclamation-triangle fa-3x mb-3" style="color: #d32f2f;"></i>
                        <h3>Error Loading Questions</h3>
                        <p class="text-muted">Please refresh the page and try again.</p>
                    </div>
                `;
            }
        }

        // Create question card HTML
        function createQuestionCard(question) {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const adminReplyHtml = question.admin_reply ? `
                <div class="admin-reply">
                    <div class="admin-reply-label">
                        <i class="fa-solid fa-user-shield me-2"></i>Admin Response
                    </div>
                    <p>${question.admin_reply}</p>
                    <small class="text-muted">Replied on: ${new Date(question.reply_date).toLocaleDateString()}</small>
                </div>
            ` : '';
            
            card.innerHTML = `
                <div class="question-header">
                    <span class="question-category">${question.category}</span>
                    <span class="question-date">${new Date(question.created_at).toLocaleDateString()}</span>
                </div>
                <h3 class="question-title">${question.title}</h3>
                <div class="question-content">${question.content}</div>
                <div class="question-meta">
                    <span class="student-name">
                        <i class="fa-solid fa-user me-1"></i>${question.name}
                    </span>
                    ${question.course ? `<span class="text-muted">Course: ${question.course}</span>` : ''}
                </div>
                ${adminReplyHtml}
            `;
            
            return card;
        }
    </script>
</body>
</html>
